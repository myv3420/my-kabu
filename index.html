<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>株管理 ＆ 黄金ルールAI v14.2</title>
    <style>
        body { margin: 0; background-color: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; height: 100dvh; overflow: hidden; }
        .page { display: none; flex-direction: column; height: 100dvh; width: 100%; position: absolute; top: 0; left: 0; }
        .page.active { display: flex; }
        .header { padding: 12px 15px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-weight: bold; color: #58a6ff; font-size: 14px; }
        
        /* APIキー入力画面 */
        #api-key-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; z-index: 9999; display: flex; flex-direction: column; justify-content: center; padding: 30px; box-sizing: border-box; }
        .api-input { padding: 15px; border-radius: 8px; border: 1px solid #30363d; background: #1c2128; color: white; margin-bottom: 15px; font-size: 16px; }
        .btn-start { padding: 15px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .content { flex: 1; overflow-y: auto; padding: 10px; padding-bottom: 80px; }
        .stock-card { background: #161b22; border: 1px solid #30363d; border-radius: 8px; padding: 12px; margin-bottom: 10px; position: relative; }
        .stock-name { font-weight: bold; font-size: 15px; color: #58a6ff; margin-bottom: 5px; display: block; }
        .stock-info { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; font-size: 12px; }
        .label { color: #8b949e; }
        .value { text-align: right; font-family: monospace; }

        /* チャットエリア */
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 10px; }
        .msg { padding: 10px 14px; border-radius: 15px; max-width: 85%; font-size: 14px; line-height: 1.5; }
        .ai-msg { background: #1c2128; border: 1px solid #30363d; align-self: flex-start; border-left: 4px solid #58a6ff; white-space: pre-wrap; }
        .user-msg { background: #238636; color: white; align-self: flex-end; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 60%; background: #161b22; border-top: 1px solid #30363d; display: flex; height: 60px; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #8b949e; cursor: pointer; }
        .nav-item.active { color: #58a6ff; font-weight: bold; }
        
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.7); display: none; justify-content: center; align-items: center; z-index: 10000; flex-direction: column; }
    </style>
</head>
<body>

<div id="api-key-screen">
    <h2 style="color:#58a6ff; text-align:center;">🔒 APIキーを入力</h2>
    <p style="font-size:12px; color:#8b949e; margin-bottom:20px; text-align:center;">GitHub等に公開しても安全な「使う時だけ入力」方式です ✨</p>
    <input type="password" id="temp-api-key" class="api-input" placeholder="AIzaSy...（キーを貼り付け）">
    <button onclick="setApiKey()" class="btn-start">アプリを開始する</button>
    <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:#8b949e; font-size:11px; margin-top:20px; text-align:center; display:block;">キーを持っていない場合はこちら（無料）</a>
</div>

<div id="loading">
    <div style="width:40px; height:40px; border:4px solid #30363d; border-top:4px solid #58a6ff; border-radius:50%; animation:spin 1s linear infinite;"></div>
    <p style="color:white; margin-top:10px; font-size:14px;">AI分析中...</p>
</div>

<div id="page-list" class="page active">
    <div class="header">
        <div class="header-title">📊 持ち株 ＆ CSV管理</div>
        <button style="background:none; border:none; color:#da3633; font-size:12px;" onclick="clearAllData()">初期化</button>
    </div>
    <div style="padding:15px; background:#1c2128; border-bottom:1px solid #30363d;">
        <label style="display:block; padding:12px; background:#1f6feb; color:white; border-radius:6px; text-align:center; font-weight:bold; font-size:14px;">
            📁 楽天証券CSVを読み込む
            <input type="file" accept=".csv" style="display:none;" onchange="handleCSV(this)">
        </label>
    </div>
    <div class="content" id="stock-list"></div>
</div>

<div id="page-chat" class="page">
    <div class="header">
        <div class="header-title">🧠 黄金ルール AI相談</div>
    </div>
    <div id="chat-messages">
        <div class="msg ai-msg">チャート画像や相談内容を送ってください！📊<br>黄金ルール（利回り4%以上、PBR1倍以下など）に基づいて分析します。</div>
    </div>
    <div style="padding:10px; background:#161b22; border-top:1px solid #30363d; display:flex; gap:8px;">
        <label style="background:#30363d; padding:10px; border-radius:6px; font-size:18px; cursor:pointer;">
            📸<input type="file" id="chat-file" accept="image/*" style="display:none;" onchange="document.getElementById('file-ok').innerText='✔️'">
        </label>
        <span id="file-ok" style="color:#3fb950; font-size:10px; align-self:center;"></span>
        <input type="text" id="chat-input" style="flex:1; background:#0d1117; border:1px solid #30363d; color:white; border-radius:6px; padding:0 10px;" placeholder="このチャートどう？">
        <button onclick="sendChat()" style="background:#238636; color:white; border:none; border-radius:6px; padding:0 15px; font-weight:bold;">送信</button>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="showPage('page-list', this)">📋 リスト</div>
    <div class="nav-item" onclick="showPage('page-chat', this)">💬 AI相談</div>
</nav>

<script>
    let API_KEY = sessionStorage.getItem('MY_GEMINI_KEY') || '';
    const STORAGE_KEY = 'my_stocks_v14_2';
    let stocks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    // 起動チェック
    window.onload = () => {
        if (API_KEY) document.getElementById('api-key-screen').style.display = 'none';
        renderStocks();
    };

    function setApiKey() {
        const key = document.getElementById('temp-api-key').value.trim();
        if (key.startsWith('AIza')) {
            API_KEY = key;
            sessionStorage.setItem('MY_GEMINI_KEY', key);
            document.getElementById('api-key-screen').style.display = 'none';
        } else {
            alert("有効なAPIキーを入力してください。");
        }
    }

    function showPage(pageId, el) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    // CSV処理（Shift-JIS対応）
    function handleCSV(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = (e) => {
            const lines = e.target.result.split('\n');
            const newStocks = [];
            lines.forEach((line, i) => {
                if (i === 0) return;
                const col = line.split(',').map(c => c.replace(/"/g, ''));
                if (col[1] && !isNaN(col[1])) {
                    newStocks.push({ code: col[1], name: col[2], qty: col[4], price: col[5], current: col[7] });
                }
            });
            stocks = newStocks;
            localStorage.setItem(STORAGE_KEY, JSON.stringify(stocks));
            renderStocks();
            alert(`${stocks.length}件読み込みました！✨`);
        };
        reader.readAsText(file, "Shift-JIS");
    }

    function renderStocks() {
        const container = document.getElementById('stock-list');
        container.innerHTML = stocks.map(s => `
            <div class="stock-card">
                <span class="stock-name">${s.name} (${s.code})</span>
                <div class="stock-info">
                    <span class="label">保有数</span><span class="value">${s.qty} 株</span>
                    <span class="label">取得単価</span><span class="value">${s.price} 円</span>
                    <span class="label">現在値</span><span class="value">${s.current} 円</span>
                </div>
            </div>
        `).join('') || '<p style="text-align:center; color:#8b949e; margin-top:50px;">CSVを読み込んでください</p>';
    }

    async function sendChat() {
        const input = document.getElementById('chat-input');
        const fileInput = document.getElementById('chat-file');
        if (!input.value && !fileInput.files[0]) return;

        const messages = document.getElementById('chat-messages');
        const userDiv = document.createElement('div');
        userDiv.className = 'msg user-msg';
        userDiv.textContent = input.value || "画像を分析して";
        messages.appendChild(userDiv);
        
        document.getElementById('loading').style.display = 'flex';

        try {
            let parts = [{ text: `あなたは配当投資の専門家です。「黄金ルール（利回り4%以上、PBR1倍以下、PER15倍以下）」に基づき、以下の内容や画像を分析して日本語でアドバイスしてください。\n\n質問: ${input.value}` }];
            
            if (fileInput.files[0]) {
                const b64 = await toBase64(fileInput.files[0]);
                parts.push({ inline_data: { mime_type: fileInput.files[0].type, data: b64.split(',')[1] } });
            }

            const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts }] })
            });

            const data = await res.json();
            const aiText = data.candidates[0].content.parts[0].text;
            
            const aiDiv = document.createElement('div');
            aiDiv.className = 'msg ai-msg';
            aiDiv.textContent = aiText;
            messages.appendChild(aiDiv);
        } catch (e) {
            alert("エラーが発生しました。キーが正しいか確認してください。");
        } finally {
            document.getElementById('loading').style.display = 'none';
            input.value = "";
            fileInput.value = "";
            document.getElementById('file-ok').innerText = "";
            messages.scrollTop = messages.scrollHeight;
        }
    }

    const toBase64 = f => new Promise(res => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); });
    function clearAllData() { if(confirm("全消去しますか？")) { localStorage.removeItem(STORAGE_KEY); stocks = []; renderStocks(); } }
</script>
<style> @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } } </style>
</body>
</html>

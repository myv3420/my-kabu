<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>株管理 ＆ 黄金ルールAI v13.8</title>
    <style>
        body { margin: 0; background-color: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
        .page { display: none; flex-direction: column; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; }
        .page.active { display: flex; }
        .header { padding: 12px 15px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-weight: bold; color: #58a6ff; font-size: 14px; }
        
        .import-section { padding: 15px; background: #1c2128; border-bottom: 1px solid #30363d; display: flex; flex-direction: column; gap: 10px; }
        .ocr-label-btn { display: block; padding: 12px; background: #238636; color: white; border-radius: 8px; font-weight: bold; text-align: center; cursor: pointer; border: none; font-size: 14px; }
        .manual-add-btn { display: block; padding: 10px; background: #30363d; color: #58a6ff; border-radius: 8px; text-align: center; cursor: pointer; border: 1px solid #58a6ff; font-size: 13px; text-decoration: none; }
        
        .stock-list-container { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .stock-item { padding: 15px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
        .stock-info { flex: 1; }
        .stock-name { font-weight: bold; font-size: 15px; color: #58a6ff; margin-bottom: 3px; }
        .stock-code { font-size: 12px; color: #8b949e; }
        .action-btn { font-size: 11px; padding: 8px 12px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; cursor: pointer; }

        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: #58a6ff; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; text-align: center; }
        .loader-spin { width: 40px; height: 40px; border: 4px solid #30363d; border-top: 4px solid #58a6ff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* チャット画面 */
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #0d1117; }
        .ai-msg { background: #21262d; padding: 15px; border-radius: 15px 15px 15px 5px; border-left: 4px solid #2962ff; align-self: flex-start; max-width: 90%; white-space: pre-wrap; font-size: 14px; line-height: 1.6; }
        .user-msg { background: #238636; color: white; padding: 12px; border-radius: 15px 15px 5px 15px; align-self: flex-end; max-width: 85%; font-size: 14px; }
        .preview-img { max-width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #30363d; }
    </style>
</head>
<body>

<div id="loading">
    <div class="loader-spin"></div>
    <div id="loading-text">銘柄データを抽出中...🚀</div>
    <div style="font-size:12px; color:#8b949e; margin-top:10px;">これに失敗したら「手動追加」が確実です！</div>
</div>

<div id="page-list" class="page active">
    <div class="header">
        <div class="header-title">📈 黄金ルールAI v13.8</div>
        <button style="background:none; border:1px solid #da3633; color:#f85149; padding:4px 8px; border-radius:4px; font-size:10px;" onclick="clearAllData()">初期化</button>
    </div>
    <div class="import-section">
        <label class="ocr-label-btn">📸 スクショで自動登録 (iSPEED対応)
            <input type="file" id="ocr-input" accept="image/*" multiple style="display:none;" onchange="importFromImages(this)">
        </label>
        <div onclick="manualAdd()" class="manual-add-btn">＋ 銘柄を手動で1つ追加する</div>
    </div>
    <div id="stock-list-container" class="stock-list-container"></div>
</div>

<div id="page-chat" class="page">
    <div class="header">
        <button onclick="showPage('page-list')" style="background:none; border:none; color:#58a6ff; font-size:14px;">◀ 戻る</button>
        <div id="chat-header-title" class="header-title">黄金ルール分析</div>
        <div style="width:40px;"></div>
    </div>
    <div id="chat-messages"></div>
    <div style="padding:15px; background:#161b22; border-top:1px solid #30363d;">
        <textarea id="user-text" rows="2" style="width:100%; background:#0d1117; color:white; border:1px solid #30363d; padding:10px; border-radius:8px; font-size:16px; box-sizing:border-box;" placeholder="質問があれば入力..."></textarea>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <label style="flex:1; background:#30363d; color:white; padding:12px; border-radius:8px; text-align:center; font-size:14px;">📸 チャート
                <input type="file" id="chat-image" accept="image/*" style="display:none;" onchange="updateChatFileStatus(this)">
            </label>
            <button style="flex:1.5; background:#2962ff; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold;" onclick="handleSend()">分析スタート！🚀</button>
        </div>
        <div id="chat-file-ok" style="font-size:11px; color:#aff5b4; text-align:center; margin-top:5px;"></div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyBa2SEsc_y-ooTnXUwKjVORk8gvKOwtbsg';
    const STORAGE_KEY = 'stock_v13_8_final';
    let appData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { stocks: [] };
    let currentStock = null;
    let selectedChatFile = null;

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    // --- 銘柄抽出エンジンの強化 ---
    async function importFromImages(input) {
        const files = Array.from(input.files);
        if (files.length === 0) return;
        document.getElementById('loading').style.display = 'flex';
        let addedCount = 0;

        for (const file of files) {
            try {
                // 指示を極限までシンプルに：プレーンテキストで出させる
                const prompt = "画像から株の銘柄名と4桁の数字（コード）を全て見つけ出し、改行区切りで書き出してください。例：トヨタ自動車 7203。余計な説明は不要です。";
                
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: file.type, data: (await toBase64(file)).split(',')[1] } }] }] })
                });
                
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                
                // テキストから正規表現で銘柄名とコードを抽出
                const lines = text.split('\n');
                lines.forEach(line => {
                    const match = line.match(/(.+?)[\s\t　]?(\d{4})/);
                    if (match) {
                        const name = match[1].trim();
                        const code = match[2].trim();
                        if (!appData.stocks.some(s => s.code === code)) {
                            appData.stocks.push({ id: Date.now() + Math.random(), name, code });
                            addedCount++;
                        }
                    }
                });
            } catch (e) { console.error(e); }
        }

        save(); render();
        document.getElementById('loading').style.display = 'none';
        alert(`${addedCount}件の銘柄を新しく登録しました！✨`);
        input.value = "";
    }

    function manualAdd() {
        const name = prompt("銘柄名を入力してください（例：ヤマハ発動機）");
        if (!name) return;
        const code = prompt("4桁のコードを入力してください（例：7272）");
        if (!code || code.length !== 4) { alert("コードは4桁の数字で入力してください。"); return; }
        
        appData.stocks.push({ id: Date.now() + Math.random(), name, code });
        save(); render();
    }

    function render() {
        const container = document.getElementById('stock-list-container');
        container.innerHTML = appData.stocks.map(s => `
            <div class="stock-item">
                <div class="stock-info" onclick="openConsult('${s.name}', '${s.code}')">
                    <div class="stock-name">${s.name}</div>
                    <div class="stock-code">コード: ${s.code}</div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="action-btn" style="border-color:#58a6ff; color:#58a6ff;" onclick="openConsult('${s.name}', '${s.code}')">分析 📈</button>
                    <button class="action-btn" onclick="deleteStock(${s.id})">🗑</button>
                </div>
            </div>
        `).join('') + (appData.stocks.length === 0 ? '<div style="padding:50px; text-align:center; color:#8b949e; font-size:13px;">スクショを読み込むか、<br>手動ボタンで銘柄を登録してください📸</div>' : '');
    }

    function openConsult(name, code) {
        currentStock = { name, code };
        document.getElementById('chat-header-title').innerText = `${name} (${code})`;
        document.getElementById('chat-messages').innerHTML = `<div class="ai-msg">「${name}」ですね！<br>楽天証券の**チャート画像**をアップロードしてください。黄金ルールで勝率を分析します！📊</div>`;
        showPage('page-chat');
    }

    function updateChatFileStatus(input) {
        selectedChatFile = input.files[0];
        document.getElementById('chat-file-ok').innerText = selectedChatFile ? "✅ チャート画像OK！" : "";
    }

    async function handleSend() {
        if (!selectedChatFile) { alert("チャート画像を選んでくださいね！📸"); return; }
        const textInput = document.getElementById('user-text');
        const messages = document.getElementById('chat-messages');
        const loading = document.getElementById('loading');

        const userText = textInput.value || "黄金ルールで分析して！";
        const userDiv = document.createElement('div'); userDiv.className = 'user-msg'; userDiv.textContent = userText;
        const img = document.createElement('img'); img.className = 'preview-img'; img.src = URL.createObjectURL(selectedChatFile);
        userDiv.appendChild(img); messages.appendChild(userDiv);
        
        loading.style.display = 'flex';
        messages.scrollTop = messages.scrollHeight;

        try {
            const prompt = `あなたは「黄金ルール」の投資顧問です。銘柄：${currentStock.name} (${currentStock.code}) のチャート画像から、GMMA、ボリンジャーバンド、RSI等のテクニカル指標を読み取り、今後の予測と戦略をズバッと回答してください。`;
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: selectedChatFile.type, data: (await toBase64(selectedChatFile)).split(',')[1] } }] }] })
            });
            const data = await response.json();
            const aiDiv = document.createElement('div'); aiDiv.className = 'ai-msg'; aiDiv.textContent = data.candidates[0].content.parts[0].text;
            messages.appendChild(aiDiv);
        } catch (e) { alert("エラーが発生しました💦"); }
        finally {
            loading.style.display = 'none';
            selectedChatFile = null;
            document.getElementById('chat-file-ok').innerText = "";
            textInput.value = "";
            messages.scrollTop = messages.scrollHeight;
        }
    }

    const toBase64 = f => new Promise((res, rej) => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); });
    function clearAllData() { if (confirm("銘柄リストをすべて削除しますか？")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }
    function deleteStock(id) { if (confirm("この銘柄を削除しますか？")) { appData.stocks = appData.stocks.filter(s => s.id !== id); save(); render(); } }

    render();
</script>
</body>
</html>

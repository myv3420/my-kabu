<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>株管理 ＆ 黄金ルールAI v14</title>
    <style>
        body { margin: 0; background-color: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; height: 100dvh; overflow: hidden; }
        .page { display: none; flex-direction: column; height: 100dvh; width: 100%; position: absolute; top: 0; left: 0; }
        .page.active { display: flex; }
        .header { padding: 12px 15px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-weight: bold; color: #58a6ff; font-size: 14px; }
        
        /* 🔑 APIキー入力画面のスタイル */
        #api-key-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #0d1117; z-index: 9999; display: flex; flex-direction: column; justify-content: center; padding: 30px; box-sizing: border-box; }
        .api-input { padding: 15px; border-radius: 8px; border: 1px solid #30363d; background: #1c2128; color: white; margin-bottom: 15px; font-size: 16px; }
        .btn-start { padding: 15px; background: #238636; color: white; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }

        .import-section { padding: 12px 15px; background: #1c2128; border-bottom: 1px solid #30363d; display: flex; flex-direction: column; gap: 8px; }
        .import-row { display: flex; gap: 8px; }
        .btn { flex: 1; padding: 10px; border-radius: 6px; font-weight: bold; font-size: 12px; text-align: center; cursor: pointer; border: 1px solid #30363d; display: flex; align-items: center; justify-content: center; gap: 5px; text-decoration: none; color: inherit; }
        .btn-ocr { background: #238636; color: white; border: none; }
        .btn-csv { background: #1f6feb; color: white; border: none; }
        .btn-manual { background: #21262d; color: #c9d1d9; }

        .stock-list-container { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .stock-item { padding: 12px 15px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
        .stock-info { flex: 1; }
        .stock-name { font-weight: bold; font-size: 14px; color: #c9d1d9; margin-bottom: 2px; display: block; }
        .stock-sub { display: flex; gap: 10px; font-size: 11px; color: #8b949e; }
        .stock-code { color: #58a6ff; font-family: monospace; }
        
        .stock-values { text-align: right; min-width: 100px; }
        .val-current { font-weight: bold; font-size: 14px; color: #e6edf3; display: block; }
        .val-profit { font-size: 11px; font-weight: bold; }
        .plus { color: #3fb950; }
        .minus { color: #f85149; }

        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 12px; background: #0d1117; }
        .ai-msg { background: #161b22; padding: 12px; border-radius: 12px 12px 12px 2px; border: 1px solid #30363d; border-left: 4px solid #2962ff; align-self: flex-start; max-width: 90%; white-space: pre-wrap; font-size: 13px; line-height: 1.5; }
        .user-msg { background: #238636; color: white; padding: 10px 14px; border-radius: 12px 12px 2px 12px; align-self: flex-end; max-width: 85%; font-size: 13px; }
        .preview-img { max-width: 100%; border-radius: 8px; margin-top: 8px; border: 1px solid #30363d; }

        .nav { position: fixed; bottom: 0; width: 100%; height: 60px; background: #161b22; border-top: 1px solid #30363d; display: flex; z-index: 100; }
        .nav-item { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; font-size: 10px; color: #8b949e; }
        .nav-item.active { color: #58a6ff; }
        .nav-icon { font-size: 20px; margin-bottom: 2px; }

        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); color: #58a6ff; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 10000; }
        .loader-spin { width: 30px; height: 30px; border: 3px solid #30363d; border-top: 3px solid #58a6ff; border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 10px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="api-key-screen">
    <h2 style="color:#58a6ff; text-align:center;">🔒 APIキーを入力</h2>
    <p style="font-size:12px; color:#8b949e; margin-bottom:20px; text-align:center;">安全のため、ブラウザを閉じるまで一時的に保存します ✨</p>
    <input type="password" id="temp-api-key" class="api-input" placeholder="AIzaSy...（新しいキーを入力）">
    <button onclick="setApiKey()" class="btn-start">アプリを開始する</button>
    <a href="https://aistudio.google.com/app/apikey" target="_blank" style="color:#8b949e; font-size:11px; margin-top:20px; text-align:center; display:block;">キーの発行はこちら（無料）</a>
</div>

<div id="loading"><div class="loader-spin"></div><div id="loading-text">解析中...</div></div>

<div id="page-list" class="page active">
    <div class="header"><div class="header-title">📈 株管理 Pro v14</div><div style="font-size:10px; color:#8b949e;" onclick="clearAllData()">初期化</div></div>
    <div class="import-section">
        <div class="import-row">
            <label class="btn btn-ocr">📸 スクショ<input type="file" id="ocr-input" accept="image/*" multiple style="display:none;" onchange="importFromImages(this)"></label>
            <label class="btn btn-csv">📁 CSV一括<input type="file" id="csv-input" accept=".csv" style="display:none;" onchange="importFromCSV(this)"></label>
        </div>
        <div class="btn btn-manual" onclick="manualAdd()">＋ 銘柄を手動で追加</div>
    </div>
    <div id="stock-list-container" class="stock-list-container"></div>
</div>

<div id="page-chat" class="page">
    <div class="header"><div class="header-title" id="chat-header-title">黄金ルール分析</div><div style="width:30px;"></div></div>
    <div id="chat-messages"></div>
    <div style="padding:12px; background:#161b22; border-top:1px solid #30363d;">
        <div style="display:flex; gap:8px; margin-bottom:8px;">
            <label style="background:#21262d; border:1px solid #30363d; padding:8px; border-radius:6px; font-size:16px; width:40px; text-align:center;">📸<input type="file" id="chat-image" accept="image/*" style="display:none;" onchange="updateChatFileStatus(this)"></label>
            <textarea id="user-text" rows="1" style="flex:1; background:#0d1117; color:white; border:1px solid #30363d; padding:10px; border-radius:8px; font-size:14px; outline:none; resize:none;" placeholder="メッセージを入力..."></textarea>
        </div>
        <button id="send-btn" style="width:100%; background:#2962ff; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold; font-size:14px;" onclick="handleSend()">分析スタート！ 🚀</button>
        <div id="chat-file-ok" style="font-size:10px; color:#3fb950; text-align:center; margin-top:4px;"></div>
    </div>
</div>

<nav class="nav">
    <div class="nav-item active" onclick="showPage('page-list', this)"><span class="nav-icon">📋</span>リスト</div>
    <div class="nav-item" onclick="showPage('page-chat', this)"><span class="nav-icon">💬</span>相談</div>
</nav>

<script>
    // 🔑 APIキー管理（変更部分）
    let API_KEY = sessionStorage.getItem('MY_GEMINI_KEY') || '';
    const STORAGE_KEY = 'stock_v14_data';
    let appData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { stocks: [] };
    let currentStock = null;
    let selectedChatFile = null;

    window.onload = () => {
        if (API_KEY) document.getElementById('api-key-screen').style.display = 'none';
        render();
    };

    function setApiKey() {
        const key = document.getElementById('temp-api-key').value.trim();
        if (key.startsWith('AIza')) {
            API_KEY = key;
            sessionStorage.setItem('MY_GEMINI_KEY', key);
            document.getElementById('api-key-screen').style.display = 'none';
        } else {
            alert("有効なAPIキーを入力してください。");
        }
    }

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }
    function showPage(id, el) { 
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); 
        document.getElementById(id).classList.add('active');
        document.querySelectorAll('.nav-item').forEach(n => n.classList.remove('active'));
        el.classList.add('active');
    }

    // CSVインポート（Shift-JIS対応を維持）
    function importFromCSV(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const lines = e.target.result.split('\n');
            let count = 0;
            lines.forEach((line, i) => {
                if (i === 0) return;
                const col = line.split(',').map(s => s.replace(/"/g, '').trim());
                if (col.length > 7 && col[1] && !isNaN(col[1])) {
                    if (!appData.stocks.some(s => s.code === col[1])) {
                        appData.stocks.push({ id: Date.now() + Math.random(), name: col[2], code: col[1], qty: col[4], avg: col[5], current: col[7] });
                        count++;
                    }
                }
            });
            save(); render();
            alert(`${count}件の銘柄をCSVから読み込みました！`);
        };
        reader.readAsText(file, "Shift-JIS");
    }

    // OCRインポート
    async function importFromImages(input) {
        const files = Array.from(input.files);
        if (files.length === 0) return;
        document.getElementById('loading').style.display = 'flex';
        let added = 0;
        for (const file of files) {
            try {
                const prompt = "楽天証券の保有銘柄画面です。銘柄名、4桁のコード、保有数量、平均取得価額、現在値を抽出してJSONで返してください。形式: {\"data\": [{\"name\": \"...\", \"code\": \"...\", \"qty\": \"...\", \"avg\": \"...\", \"current\": \"...\"}]}";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: file.type, data: (await toBase64(file)).split(',')[1] } }] }] })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                JSON.parse(text).data.forEach(s => {
                    if (!appData.stocks.some(ex => ex.code === s.code)) {
                        appData.stocks.push({ ...s, id: Date.now() + Math.random() });
                        added++;
                    }
                });
            } catch (e) { console.error(e); }
        }
        save(); render();
        document.getElementById('loading').style.display = 'none';
        input.value = "";
    }

    function render() {
        const container = document.getElementById('stock-list-container');
        container.innerHTML = appData.stocks.map(s => {
            const diff = (parseFloat(s.current) - parseFloat(s.avg)) * parseFloat(s.qty);
            const isPlus = diff >= 0;
            return `
            <div class="stock-item">
                <div class="stock-info" onclick="openConsult('${s.name}', '${s.code}')">
                    <span class="stock-name">${s.name}</span>
                    <div class="stock-sub"><span class="stock-code">${s.code}</span><span>${Number(s.qty).toLocaleString()}株</span></div>
                </div>
                <div class="stock-values" onclick="openConsult('${s.name}', '${s.code}')">
                    <span class="val-current">¥${Number(s.current).toLocaleString()}</span>
                    <span class="val-profit ${isPlus ? 'plus' : 'minus'}">${isPlus ? '+' : ''}${Math.round(diff).toLocaleString()}</span>
                </div>
                <div style="margin-left:10px; color:#30363d;" onclick="deleteStock(${s.id})">✕</div>
            </div>
        `}).join('') || '<div style="padding:40px; text-align:center; color:#8b949e; font-size:12px;">銘柄を登録してください</div>';
    }

    function openConsult(name, code) {
        currentStock = { name, code };
        document.getElementById('chat-header-title').innerText = `${name} (${code})`;
        document.getElementById('chat-messages').innerHTML = `<div class="ai-msg">「${name}」の分析を始めます。チャート画像をアップロードするか、今の状況を教えてください！📉</div>`;
        showPage('page-chat', document.querySelectorAll('.nav-item')[1]);
    }

    function updateChatFileStatus(input) {
        selectedChatFile = input.files[0];
        document.getElementById('chat-file-ok').innerText = selectedChatFile ? "📸 画像セット完了" : "";
    }

    async function handleSend() {
        const textInput = document.getElementById('user-text');
        const messages = document.getElementById('chat-messages');
        const loading = document.getElementById('loading');
        if (!textInput.value && !selectedChatFile) return;

        const userMsg = textInput.value || "チャートを分析して";
        const userDiv = document.createElement('div');
        userDiv.className = 'user-msg';
        userDiv.textContent = userMsg;
        if (selectedChatFile) {
            const img = document.createElement('img');
            img.className = 'preview-img';
            img.src = URL.createObjectURL(selectedChatFile);
            userDiv.appendChild(img);
        }
        messages.appendChild(userDiv);
        loading.style.display = 'flex';
        messages.scrollTop = messages.scrollHeight;

        try {
            const prompt = `投資顧問として「${currentStock ? currentStock.name : 'この銘柄'}」を分析してください。黄金ルール（利回り4%以上、PBR1倍以下、PER15倍以下）を重視し、チャートから買い時を判断してください。`;
            const parts = [{ text: prompt + "\n質問: " + userMsg }];
            if (selectedChatFile) parts.push({ inline_data: { mime_type: selectedChatFile.type, data: (await toBase64(selectedChatFile)).split(',')[1] } });

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts }] })
            });
            const data = await response.json();
            const aiDiv = document.createElement('div');
            aiDiv.className = 'ai-msg';
            aiDiv.textContent = data.candidates[0].content.parts[0].text;
            messages.appendChild(aiDiv);
        } catch (e) { alert("エラーが発生しました。"); }
        finally {
            loading.style.display = 'none';
            selectedChatFile = null;
            document.getElementById('chat-file-ok').innerText = "";
            textInput.value = "";
            messages.scrollTop = messages.scrollHeight;
        }
    }

    function manualAdd() {
        const name = prompt("銘柄名");
        const code = prompt("コード");
        if (name && code) { appData.stocks.push({ id: Date.now(), name, code, qty: "0", avg: "0", current: "0" }); save(); render(); }
    }
    const toBase64 = f => new Promise((res) => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); });
    function clearAllData() { if (confirm("全消去しますか？")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }
    function deleteStock(id) { if (confirm("削除しますか？")) { appData.stocks = appData.stocks.filter(s => s.id !== id); save(); render(); } }
</script>
</body>
</html>

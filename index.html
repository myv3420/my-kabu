<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>株管理 ＆ 黄金ルールAI v13.7</title>
    <style>
        body { margin: 0; background-color: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
        .page { display: none; flex-direction: column; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; }
        .page.active { display: flex; }
        .header { padding: 12px 15px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-weight: bold; color: #58a6ff; font-size: 14px; }
        
        .import-section { padding: 15px; background: #1c2128; border-bottom: 1px solid #30363d; text-align: center; }
        .ocr-label-btn { display: inline-block; width: 100%; max-width: 300px; padding: 12px; background: #238636; color: white; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; border: none; }
        .stock-list-container { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .stock-item { padding: 15px; border-bottom: 1px solid #21262d; }
        .stock-name { font-weight: bold; font-size: 15px; color: #58a6ff; margin-bottom: 5px; }
        .item-controls { display: flex; gap: 8px; margin-top: 10px; }
        .action-btn { font-size: 11px; padding: 7px 10px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; cursor: pointer; }

        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #0d1117; }
        .ai-msg { background: #21262d; padding: 15px; border-radius: 15px 15px 15px 5px; border-left: 4px solid #2962ff; align-self: flex-start; max-width: 90%; white-space: pre-wrap; font-size: 14px; line-height: 1.6; }
        .user-msg { background: #238636; color: white; padding: 12px; border-radius: 15px 15px 5px 15px; align-self: flex-end; max-width: 85%; font-size: 14px; }
        .preview-img { max-width: 100%; border-radius: 10px; margin-top: 8px; }
        .chat-controls { padding: 15px; background: #161b22; border-top: 1px solid #30363d; }
        textarea { width: 100%; background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 10px; resize: none; font-size: 16px; box-sizing: border-box; outline: none; }
        
        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); color: #58a6ff; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; font-weight: bold; text-align: center; }
        .loader-spin { width: 30px; height: 30px; border: 3px solid #30363d; border-top: 3px solid #58a6ff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 15px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading">
    <div class="loader-spin"></div>
    <div id="loading-text">iSPEED画像をスキャン中...📊✨</div>
</div>

<div id="page-list" class="page active">
    <div class="header">
        <div class="header-title">📊 株管理 ＆ 黄金ルールAI v13.7</div>
        <button style="font-size:10px; background:#da3633; color:white; border:none; padding:6px 10px; border-radius:6px;" onclick="clearAllData()">リセット</button>
    </div>
    <div class="import-section">
        <label class="ocr-label-btn">📸 アプリのスクショで一括登録
            <input type="file" id="ocr-input" accept="image/*" multiple style="display:none;" onchange="importFromImages(this)">
        </label>
        <div style="font-size:10px; color:#8b949e; margin-top:8px;">楽天証券アプリの「保有銘柄」画面が最適です！</div>
    </div>
    <div id="stock-list-container" class="stock-list-container"></div>
</div>

<div id="page-chat" class="page">
    <div class="header">
        <button onclick="showPage('page-list')" style="background:none; border:none; color:#58a6ff; font-size:14px;">◀ 戻る</button>
        <div id="chat-header-title" class="header-title">分析</div>
        <div style="width:40px;"></div>
    </div>
    <div id="chat-messages"></div>
    <div class="chat-controls">
        <textarea id="user-text" rows="2" placeholder="質問を入力..."></textarea>
        <div class="chat-btns" style="display:flex; gap:10px; margin-top:10px;">
            <label class="action-btn" style="flex:1; background:#30363d; text-align:center; padding:12px;">📸 チャート画像
                <input type="file" id="chat-image" accept="image/*" style="display:none;" onchange="updateChatFileStatus(this)">
            </label>
            <button class="action-btn" style="flex:1; background:#2962ff; color:white; font-weight:bold; border:none;" onclick="handleSend()">分析開始</button>
        </div>
        <div id="chat-file-ok" style="font-size:11px; color:#aff5b4; text-align:center; margin-top:5px;"></div>
    </div>
</div>

<script>
    const API_KEY = 'AIzaSyBa2SEsc_y-ooTnXUwKjVORk8gvKOwtbsg';
    const STORAGE_KEY = 'stock_app_v13_7_ispeed';
    let appData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { stocks: [] };
    let currentStock = null;
    let selectedChatFile = null;

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    // --- 解析ロジック ---
    async function importFromImages(input) {
        const files = Array.from(input.files);
        if (files.length === 0) return;
        
        const loading = document.getElementById('loading');
        const loadingText = document.getElementById('loading-text');
        loading.style.display = 'flex';
        
        let totalAdded = 0;

        for (let i = 0; i < files.length; i++) {
            const file = files[i];
            loadingText.innerText = `${files.length}枚中 ${i+1}枚目を解析中...🔍`;
            
            try {
                const prompt = `この画像は楽天証券アプリ「iSPEED」の保有銘柄画面です。
                黒い背景に白文字で書かれた「銘柄名」と、そのすぐ下にある「4桁の数字（銘柄コード）」をペアですべて抽出してください。
                出力形式は必ず以下のJSON形式のみとし、他のテキストは一切含めないでください。
                {"results": [{"name": "銘柄名", "code": "4桁の数字"}]}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: file.type, data: (await toBase64(file)).split(',')[1] } }] }] })
                });
                const data = await response.json();
                const jsonText = data.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                const parsed = JSON.parse(jsonText);
                
                parsed.results.forEach(s => {
                    const cleanCode = s.code.replace(/[^0-9]/g, '').substring(0,4);
                    if (cleanCode.length === 4 && !appData.stocks.some(existing => existing.code === cleanCode)) {
                        appData.stocks.push({ id: Date.now() + Math.random(), name: s.name, code: cleanCode });
                        totalAdded++;
                    }
                });
            } catch (e) { console.error(e); }
        }

        save(); render();
        loading.style.display = 'none';
        alert(`${totalAdded}件の銘柄を登録しました！💪✨`);
        input.value = "";
    }

    function render() {
        const container = document.getElementById('stock-list-container');
        container.innerHTML = appData.stocks.map(s => `
            <div class="stock-item">
                <div class="stock-name" onclick="openConsult('${s.name}', '${s.code}')">${s.name}</div>
                <div style="font-size:12px; color:#8b949e;">${s.code}</div>
                <div class="item-controls">
                    <button class="action-btn" style="border-color:#58a6ff; color:#58a6ff;" onclick="openConsult('${s.name}', '${s.code}')">📝 黄金ルール分析</button>
                    <button class="action-btn" onclick="deleteStock(${s.id})">🗑 削除</button>
                </div>
            </div>
        `).join('') + (appData.stocks.length === 0 ? '<div style="padding:40px; text-align:center; color:#8b949e;">銘柄がありません。スクショから読み込んでください📸</div>' : '');
    }

    function openConsult(name, code) {
        currentStock = { name, code };
        document.getElementById('chat-header-title').innerText = `${name} (${code})`;
        document.getElementById('chat-messages').innerHTML = `<div class="ai-msg">「${name}」ですね！了解です👍<br>チャートのスクショを送ってください。黄金ルールでチェックします！</div>`;
        showPage('page-chat');
    }

    function updateChatFileStatus(input) {
        selectedChatFile = input.files[0];
        document.getElementById('chat-file-ok').innerText = selectedChatFile ? "✅ 画像セット完了" : "";
    }

    async function handleSend() {
        if (!selectedChatFile) { alert("チャート画像を選んでくださいね！📸"); return; }
        const textInput = document.getElementById('user-text');
        const messages = document.getElementById('chat-messages');
        const loading = document.getElementById('loading');

        const userText = textInput.value || "このチャートを黄金ルールで分析して！";
        const userDiv = document.createElement('div'); userDiv.className = 'user-msg'; userDiv.textContent = userText;
        const img = document.createElement('img'); img.className = 'preview-img'; img.src = URL.createObjectURL(selectedChatFile);
        userDiv.appendChild(img); messages.appendChild(userDiv);
        
        loading.style.display = 'flex';
        messages.scrollTop = messages.scrollHeight;

        try {
            const prompt = `銘柄：${currentStock.name} (${currentStock.code})。黄金ルール（GMMA、ボリバン、RSI等）でチャートを分析し、戦略を提案してください。`;
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: selectedChatFile.type, data: (await toBase64(selectedChatFile)).split(',')[1] } }] }] })
            });
            const data = await response.json();
            const aiDiv = document.createElement('div'); aiDiv.className = 'ai-msg'; aiDiv.textContent = data.candidates[0].content.parts[0].text;
            messages.appendChild(aiDiv);
        } catch (e) { alert("エラーが起きました💦"); }
        finally {
            loading.style.display = 'none';
            selectedChatFile = null;
            document.getElementById('chat-file-ok').innerText = "";
            textInput.value = "";
            messages.scrollTop = messages.scrollHeight;
        }
    }

    const toBase64 = f => new Promise((res, rej) => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); });
    function clearAllData() { if (confirm("すべて消去しますか？")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }
    function deleteStock(id) { if (confirm("削除しますか？")) { appData.stocks = appData.stocks.filter(s => s.id !== id); save(); render(); } }

    render();
</script>
</body>
</html>

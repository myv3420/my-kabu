<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>株管理 ＆ 黄金ルールAI v15.0</title>
    <style>
        body { margin: 0; background-color: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; }
        .header { padding: 15px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-title { font-weight: bold; color: #58a6ff; }
        
        .upload-zone { padding: 20px; background: #1c2128; border-bottom: 1px solid #30363d; text-align: center; }
        .btn-csv { display: block; padding: 15px; background: #1f6feb; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 15px; width: 100%; }
        
        .stock-card { background: #161b22; margin: 10px; padding: 15px; border-radius: 10px; border: 1px solid #30363d; }
        .stock-name { font-weight: bold; color: #58a6ff; font-size: 16px; margin-bottom: 10px; display: block; }
        .grid-data { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 12px; }
        .label { color: #8b949e; }
        .value { text-align: right; font-family: monospace; }
        
        .how-to { font-size: 11px; color: #8b949e; text-align: left; margin-top: 15px; line-height: 1.6; background: #0d1117; padding: 10px; border-radius: 6px; }
    </style>
</head>
<body>

<div class="header">
    <div class="header-title">📊 爆速・確実読み込み v15.0</div>
    <button style="background:none; border:none; color:#da3633; font-size:12px;" onclick="clearAll()">リセット</button>
</div>

<div class="upload-zone">
    <label class="btn-csv">📁 楽天証券のCSVを選択
        <input type="file" id="csv-input" accept=".csv" style="display:none;" onchange="handleCSV(this)">
    </label>
    
    <div class="how-to">
        <strong>💡 100%成功する手順:</strong><br>
        1. iSPEEDではなく、ブラウザ版「楽天証券」にログイン<br>
        2. [保有商品一覧] 画面の下にある「CSV保存」を押す<br>
        3. このアプリでそのファイルを選べば、全銘柄が一瞬で入ります！
    </div>
</div>

<div id="list-container"></div>

<script>
    const STORAGE_KEY = 'stock_csv_v15';
    let stocks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    function handleCSV(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = function(e) {
            const text = e.target.result;
            // 楽天証券のCSVはShift-JISなので文字化け対策（本来はライブラリが必要ですが簡易対応）
            const lines = text.split('\n');
            const newStocks = [];

            // 楽天のCSVフォーマットに合わせて解析（簡易版）
            for (let i = 1; i < lines.length; i++) {
                const col = lines[i].split(',');
                if (col.length > 5) {
                    newStocks.push({
                        code: col[1]?.replace(/"/g, ''),
                        name: col[2]?.replace(/"/g, ''),
                        quantity: col[4]?.replace(/"/g, ''),
                        avgPrice: col[5]?.replace(/"/g, ''),
                        currentPrice: col[7]?.replace(/"/g, '')
                    });
                }
            }
            stocks = newStocks.filter(s => s.code && !isNaN(s.code));
            localStorage.setItem(STORAGE_KEY, JSON.stringify(stocks));
            render();
            alert(`${stocks.length}件の銘柄を100%正確に読み込みました！`);
        };
        reader.readAsText(file, "Shift-JIS");
    }

    function render() {
        const container = document.getElementById('list-container');
        container.innerHTML = stocks.map(s => `
            <div class="stock-card">
                <span class="stock-name">${s.name} (${s.code})</span>
                <div class="grid-data">
                    <span class="label">保有数</span><span class="value">${Number(s.quantity).toLocaleString()} 株</span>
                    <span class="label">取得単価</span><span class="value">${Number(s.avgPrice).toLocaleString()} 円</span>
                    <span class="label">現在値</span><span class="value">${Number(s.currentPrice).toLocaleString()} 円</span>
                </div>
            </div>
        `).join('') || '<p style="text-align:center; color:#8b949e; margin-top:50px;">CSVファイルを読み込んでください</p>';
    }

    function clearAll() { if(confirm("消去しますか？")) { localStorage.removeItem(STORAGE_KEY); stocks = []; render(); } }
    render();
</script>
</body>
</html>

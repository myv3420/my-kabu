<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>株管理 ＆ 黄金ルールAI v14</title>
    <style>
        body { margin: 0; background-color: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; height: 100dvh; overflow: hidden; }
        .page { display: none; flex-direction: column; height: 100dvh; width: 100%; position: absolute; top: 0; left: 0; }
        .page.active { display: flex; }
        .header { padding: 12px 15px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-weight: bold; color: #58a6ff; font-size: 14px; }
        
        .import-section { padding: 12px 15px; background: #1c2128; border-bottom: 1px solid #30363d; display: flex; flex-direction: column; gap: 8px; }
        
        /* インポートボタン行 */
        .import-row { display: flex; gap: 8px; }
        .import-btn { flex: 1; padding: 11px 8px; border-radius: 8px; font-weight: bold; text-align: center; cursor: pointer; border: none; font-size: 13px; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .btn-image { background: #238636; color: white; }
        .btn-csv   { background: #1f6feb; color: white; }
        .btn-manual{ background: #21262d; color: #58a6ff; border: 1px solid #388bfd; font-size: 12px; padding: 9px 8px; }

        /* CSV形式ヒント */
        .csv-hint { font-size: 10px; color: #8b949e; padding: 6px 10px; background: #0d1117; border-radius: 6px; border: 1px dashed #30363d; line-height: 1.6; }
        .csv-hint code { color: #79c0ff; font-family: monospace; font-size: 11px; }

        .stock-list-container { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .stock-count { font-size: 11px; color: #8b949e; padding: 8px 15px; border-bottom: 1px solid #21262d; }
        .stock-item { padding: 15px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
        .stock-info { flex: 1; }
        .stock-name { font-weight: bold; font-size: 15px; color: #58a6ff; margin-bottom: 3px; }
        .stock-code { font-size: 12px; color: #8b949e; }
        .action-btn { font-size: 11px; padding: 8px 12px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; cursor: pointer; }

        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); color: #58a6ff; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; text-align: center; padding: 20px; box-sizing: border-box; }
        .loader-spin { width: 40px; height: 40px; border: 4px solid #30363d; border-top: 4px solid #58a6ff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        
        /* チャット画面 */
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #0d1117; }
        .ai-msg { background: #21262d; padding: 15px; border-radius: 15px 15px 15px 5px; border-left: 4px solid #2962ff; align-self: flex-start; max-width: 90%; white-space: pre-wrap; font-size: 14px; line-height: 1.6; }
        .user-msg { background: #238636; color: white; padding: 12px; border-radius: 15px 15px 5px 15px; align-self: flex-end; max-width: 85%; font-size: 14px; }
        .preview-img { max-width: 100%; border-radius: 10px; margin-top: 10px; border: 1px solid #30363d; }

        /* APIキー設定画面 */
        #page-apikey { justify-content: center; align-items: center; background: #0d1117; padding: 30px 24px; box-sizing: border-box; }
        .apikey-card { width: 100%; max-width: 400px; background: #161b22; border: 1px solid #30363d; border-radius: 16px; padding: 28px 24px; display: flex; flex-direction: column; gap: 18px; }
        .apikey-logo { font-size: 36px; text-align: center; }
        .apikey-title { font-size: 18px; font-weight: bold; color: #58a6ff; text-align: center; }
        .apikey-desc { font-size: 12px; color: #8b949e; line-height: 1.7; text-align: center; }
        .apikey-input-wrap { position: relative; }
        .apikey-input { width: 100%; background: #0d1117; color: #e6edf3; border: 1px solid #30363d; border-radius: 8px; padding: 12px 44px 12px 12px; font-size: 14px; box-sizing: border-box; font-family: monospace; }
        .apikey-input:focus { outline: none; border-color: #58a6ff; }
        .apikey-toggle { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: none; border: none; color: #8b949e; cursor: pointer; font-size: 16px; padding: 0; }
        .apikey-save-btn { background: #238636; color: white; border: none; border-radius: 8px; padding: 14px; font-size: 15px; font-weight: bold; cursor: pointer; }
        .apikey-save-btn:active { background: #2ea043; }
        .apikey-hint { font-size: 11px; color: #8b949e; text-align: center; }
        .apikey-hint a { color: #58a6ff; }
        .apikey-status { font-size: 12px; text-align: center; min-height: 18px; }

        /* ヘッダーのキーアイコン */
        .key-btn { background:none; border:1px solid #30363d; color:#8b949e; padding:4px 8px; border-radius:4px; font-size:10px; cursor:pointer; }
        .key-btn.ok { border-color:#238636; color:#3fb950; }

        /* CSVプレビューモーダル */
        #csv-modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.85); z-index:1500; flex-direction:column; justify-content:flex-end; }
        #csv-modal.open { display:flex; }
        .csv-modal-inner { background:#161b22; border-radius:16px 16px 0 0; padding:20px; max-height:80vh; display:flex; flex-direction:column; }
        .csv-modal-title { font-weight:bold; color:#58a6ff; font-size:15px; margin-bottom:4px; }
        .csv-modal-sub { font-size:11px; color:#8b949e; margin-bottom:14px; }
        .csv-preview-list { flex:1; overflow-y:auto; margin-bottom:14px; }
        .csv-row { display:flex; align-items:center; gap:10px; padding:8px 0; border-bottom:1px solid #21262d; font-size:13px; }
        .csv-row .chk { width:20px; height:20px; accent-color:#58a6ff; cursor:pointer; flex-shrink:0; }
        .csv-row .code-badge { background:#21262d; color:#79c0ff; border-radius:4px; padding:2px 6px; font-size:12px; font-family:monospace; flex-shrink:0; }
        .csv-row .dup-badge { background:#30363d; color:#8b949e; border-radius:4px; padding:2px 6px; font-size:10px; flex-shrink:0; }
        .csv-actions { display:flex; gap:10px; }
        .csv-cancel { flex:1; padding:12px; background:#21262d; color:#c9d1d9; border:none; border-radius:8px; font-size:14px; cursor:pointer; }
        .csv-confirm { flex:2; padding:12px; background:#238636; color:white; border:none; border-radius:8px; font-weight:bold; font-size:14px; cursor:pointer; }
        .sel-all-btn { font-size:11px; color:#58a6ff; background:none; border:none; cursor:pointer; padding:0 0 10px 0; text-align:left; }
    </style>
</head>
<body>

<div id="loading">
    <div class="loader-spin"></div>
    <div id="loading-text">銘柄データを抽出中...🚀</div>
    <div style="font-size:12px; color:#8b949e; margin-top:10px;">これに失敗したら「手動追加」が確実です！</div>
</div>

<!-- CSVプレビューモーダル -->
<div id="csv-modal">
    <div class="csv-modal-inner">
        <div class="csv-modal-title">📋 CSVインポート確認</div>
        <div class="csv-modal-sub" id="csv-modal-sub">0件の銘柄が見つかりました</div>
        <button class="sel-all-btn" onclick="toggleSelectAll()">▶ 全選択 / 全解除</button>
        <div class="csv-preview-list" id="csv-preview-list"></div>
        <div class="csv-actions">
            <button class="csv-cancel" onclick="closeCsvModal()">キャンセル</button>
            <button class="csv-confirm" onclick="confirmCsvImport()">選択した銘柄を追加 ✓</button>
        </div>
    </div>
</div>

<!-- APIキー設定画面 -->
<div id="page-apikey" class="page">
    <div class="apikey-card">
        <div class="apikey-logo">🔑</div>
        <div class="apikey-title">Gemini APIキー設定</div>
        <div class="apikey-desc">
            このアプリはGoogle Gemini AIを使用します。<br>
            Google AI StudioでAPIキーを取得して入力してください。<br>
            キーはこの端末にのみ保存されます。
        </div>
        <div class="apikey-input-wrap">
            <input type="password" id="apikey-input" class="apikey-input" placeholder="AIzaSy...">
            <button class="apikey-toggle" onclick="toggleApiKeyVisibility()" id="apikey-toggle-btn">👁</button>
        </div>
        <div class="apikey-status" id="apikey-status"></div>
        <button class="apikey-save-btn" onclick="saveApiKey()">保存してはじめる →</button>
        <div class="apikey-hint">
            APIキーの取得は<br>
            <a href="https://aistudio.google.com/app/apikey" target="_blank">aistudio.google.com</a> から無料で発行できます
        </div>
    </div>
</div>

<div id="page-list" class="page">
    <div class="header">
        <div class="header-title">📈 黄金ルールAI v14</div>
        <div style="display:flex; gap:6px; align-items:center;">
            <button class="key-btn" id="header-key-btn" onclick="showPage('page-apikey')">🔑 APIキー</button>
            <button style="background:none; border:1px solid #da3633; color:#f85149; padding:4px 8px; border-radius:4px; font-size:10px;" onclick="clearAllData()">初期化</button>
        </div>
    </div>
    <div class="import-section">
        <div class="import-row">
            <!-- 画像OCR -->
            <label class="import-btn btn-image">
                📸 スクショ読込
                <input type="file" id="ocr-input" accept="image/*" multiple style="display:none;" onchange="importFromImages(this)">
            </label>
            <!-- CSV -->
            <label class="import-btn btn-csv">
                📄 CSV読込
                <input type="file" id="csv-input" accept=".csv,text/csv" style="display:none;" onchange="importFromCSV(this)">
            </label>
            <!-- 手動 -->
            <button class="import-btn btn-manual" onclick="manualAdd()">＋ 手動追加</button>
        </div>
        <div class="csv-hint">
            📄 <b>CSVフォーマット例：</b><br>
            <code>銘柄名,コード</code>（1行目ヘッダー任意）<br>
            <code>トヨタ自動車,7203</code><br>
            <code>ソニーグループ,6758</code>
        </div>
    </div>
    <div class="stock-count" id="stock-count">登録銘柄：0件</div>
    <div id="stock-list-container" class="stock-list-container"></div>
</div>

<div id="page-chat" class="page">
    <div class="header">
        <button onclick="showPage('page-list')" style="background:none; border:none; color:#58a6ff; font-size:14px;">◀ 戻る</button>
        <div id="chat-header-title" class="header-title">黄金ルール分析</div>
        <div style="width:40px;"></div>
    </div>
    <div id="chat-messages"></div>
    <div style="padding:15px; background:#161b22; border-top:1px solid #30363d; flex-shrink:0;">
        <textarea id="user-text" rows="2" style="width:100%; background:#0d1117; color:white; border:1px solid #30363d; padding:10px; border-radius:8px; font-size:16px; box-sizing:border-box;" placeholder="質問があれば入力..."></textarea>
        <div style="display:flex; gap:10px; margin-top:10px;">
            <label style="flex:1; background:#30363d; color:white; padding:12px; border-radius:8px; text-align:center; font-size:14px;">📸 チャート
                <input type="file" id="chat-image" accept="image/*" style="display:none;" onchange="updateChatFileStatus(this)">
            </label>
            <button style="flex:1.5; background:#2962ff; color:white; border:none; padding:12px; border-radius:8px; font-weight:bold;" onclick="handleSend()">分析スタート！🚀</button>
        </div>
        <div id="chat-file-ok" style="font-size:11px; color:#aff5b4; text-align:center; margin-top:5px;"></div>
    </div>
</div>

<script>
    const STORAGE_KEY = 'stock_v14_csv';
    const APIKEY_STORAGE = 'gemini_api_key';
    let appData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { stocks: [] };
    let currentStock = null;
    let selectedChatFile = null;
    let csvPendingRows = [];

    // APIキーをlocalStorageから取得（なければ空文字）
    function getApiKey() { return localStorage.getItem(APIKEY_STORAGE) || ''; }

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }

    function saveApiKey() {
        const val = document.getElementById('apikey-input').value.trim();
        const status = document.getElementById('apikey-status');
        if (!val.startsWith('AIza') || val.length < 30) {
            status.style.color = '#f85149';
            status.textContent = '⚠️ キーの形式が正しくないようです（AIzaSy...）';
            return;
        }
        localStorage.setItem(APIKEY_STORAGE, val);
        status.style.color = '#3fb950';
        status.textContent = '✅ 保存しました！';
        updateKeyBtnState();
        setTimeout(() => showPage('page-list'), 700);
    }

    function toggleApiKeyVisibility() {
        const inp = document.getElementById('apikey-input');
        const btn = document.getElementById('apikey-toggle-btn');
        if (inp.type === 'password') { inp.type = 'text'; btn.textContent = '🙈'; }
        else { inp.type = 'password'; btn.textContent = '👁'; }
    }

    function updateKeyBtnState() {
        const btn = document.getElementById('header-key-btn');
        if (getApiKey()) { btn.classList.add('ok'); btn.textContent = '🔑 設定済'; }
        else { btn.classList.remove('ok'); btn.textContent = '🔑 APIキー'; }
    }

    // ===== ページ管理 + スマホ戻るボタン対応 =====
    function showPage(id) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        if (id === 'page-chat') {
            history.pushState({ page: 'page-list' }, '');
        }
        if (id === 'page-apikey') {
            // 既存キーをinputに表示（マスク状態で）
            const existing = getApiKey();
            document.getElementById('apikey-input').value = existing;
            document.getElementById('apikey-status').textContent = '';
        }
    }
    window.addEventListener('popstate', (e) => {
        const chatPage = document.getElementById('page-chat');
        if (chatPage.classList.contains('active')) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            document.getElementById('page-list').classList.add('active');
        }
    });

    // ===== 画像OCR取込 =====
    async function importFromImages(input) {
        const files = Array.from(input.files);
        if (files.length === 0) return;
        document.getElementById('loading').style.display = 'flex';
        let addedCount = 0;

        for (const file of files) {
            try {
                const prompt = "画像から株の銘柄名と4桁の数字（コード）を全て見つけ出し、改行区切りで書き出してください。例：トヨタ自動車 7203。余計な説明は不要です。";
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${getApiKey()}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: file.type, data: (await toBase64(file)).split(',')[1] } }] }] })
                });
                const data = await response.json();
                const text = data.candidates[0].content.parts[0].text;
                const lines = text.split('\n');
                lines.forEach(line => {
                    const match = line.match(/(.+?)[\s\t　]?(\d{4})/);
                    if (match) {
                        const name = match[1].trim();
                        const code = match[2].trim();
                        if (!appData.stocks.some(s => s.code === code)) {
                            appData.stocks.push({ id: Date.now() + Math.random(), name, code });
                            addedCount++;
                        }
                    }
                });
            } catch (e) { console.error(e); }
        }

        save(); render();
        document.getElementById('loading').style.display = 'none';
        alert(`${addedCount}件の銘柄を新しく登録しました！✨`);
        input.value = "";
    }

    // ===== CSV取込 =====
    function importFromCSV(input) {
        const file = input.files[0];
        if (!file) return;

        const reader = new FileReader();
        reader.onload = (e) => {
            // Shift-JIS / UTF-8 両対応
            let text = e.target.result;
            const rows = text.split(/\r?\n/).filter(r => r.trim() !== '');
            csvPendingRows = [];

            // ===== 楽天証券・SBI・iSPEED等 各種CSVフォーマット対応 =====
            // 口座区分など「銘柄名でない列」を除外するキーワード
            const NOT_NAME_PATTERN = /^(NISA|特定|一般|成長投資枠|つみたて枠|課税|非課税|口座|国内株式|外国株式|投資信託|株式|ETF|REIT|ファンド|-)$/;

            // ヘッダー行を解析して列インデックスを特定
            let codeColIdx = -1, nameColIdx = -1;
            const firstRowCols = rows[0] ? rows[0].split(/[,\t]/).map(c => c.trim().replace(/^["']|["']$/g, '')) : [];
            firstRowCols.forEach((h, i) => {
                if (/^(銘柄コード|コード|証券コード|ticker|code)$/i.test(h)) codeColIdx = i;
                if (/^(銘柄名|銘柄|name|会社名|銘柄・ファンド名)$/i.test(h)) nameColIdx = i;
            });
            const hasHeader = codeColIdx >= 0 || nameColIdx >= 0;
            const startIdx = hasHeader ? 1 : 0;

            rows.forEach((row, idx) => {
                if (idx < startIdx) return;
                const cols = row.split(/[,\t]/).map(c => c.trim().replace(/^["']|["']$/g, ''));
                if (cols.length < 2) return;

                let name = '', code = '';

                if (hasHeader && codeColIdx >= 0 && nameColIdx >= 0) {
                    // ヘッダーで両列が特定できた場合
                    code = cols[codeColIdx] || '';
                    name = cols[nameColIdx] || '';
                } else if (hasHeader && codeColIdx >= 0) {
                    // コード列のみ特定できた場合：4桁コード以外のNOT_NAME除外候補から名前を探す
                    code = cols[codeColIdx] || '';
                    const candidates = cols.filter((c, i) => i !== codeColIdx && c.length >= 2 && !/^\d+([.,]\d+)?$/.test(c) && !NOT_NAME_PATTERN.test(c));
                    name = candidates[0] || '';
                } else {
                    // ヘッダーなし or 未検出：全列から4桁コードを探す
                    let foundCodeIdx = -1;
                    cols.forEach((c, i) => { if (/^\d{4}$/.test(c)) foundCodeIdx = i; });
                    if (foundCodeIdx < 0) return;
                    code = cols[foundCodeIdx];
                    // NOT_NAMEパターン・数値を除いた候補から銘柄名を選ぶ
                    const candidates = cols.filter((c, i) => i !== foundCodeIdx && c.length >= 2 && !/^\d+([.,]\d+)?%?$/.test(c) && !NOT_NAME_PATTERN.test(c));
                    name = candidates[0] || '';
                }

                // ヘッダー行の混入スキップ
                if (/^(銘柄コード|コード|code)$/i.test(code)) return;
                if (!/^\d{4}$/.test(code)) return;

                // 銘柄名が空 or 除外対象なら、AIで後から補完
                const needsLookup = !name || NOT_NAME_PATTERN.test(name);
                if (needsLookup) name = `銘柄${code}`;

                const isDup = appData.stocks.some(s => s.code === code);
                csvPendingRows.push({ name, code, isDup, needsNameLookup: needsLookup });
            });

            if (csvPendingRows.length === 0) {
                alert("読み込める銘柄データが見つかりませんでした。\nフォーマット：銘柄名,コード（4桁）");
                input.value = "";
                return;
            }

            openCsvModal();
        };

        // Shift-JIS対応のためbinaryStringで読み込みバイナリ変換
        reader.readAsText(file, 'UTF-8');
        input.value = "";
    }

    async function openCsvModal() {
        const sub = document.getElementById('csv-modal-sub');
        const newCount = csvPendingRows.filter(r => !r.isDup).length;
        const dupCount = csvPendingRows.filter(r => r.isDup).length;
        sub.textContent = `${csvPendingRows.length}件検出（新規:${newCount}件 / 重複:${dupCount}件）`;
        renderCsvList();
        document.getElementById('csv-modal').classList.add('open');

        // 銘柄名が不明（「銘柄XXXX」）なものをAIで一括補完
        const needsLookup = csvPendingRows.filter(r => r.needsNameLookup);
        if (needsLookup.length > 0) {
            sub.textContent += '　⏳ 銘柄名を取得中...';
            try {
                const codeList = needsLookup.map(r => r.code).join(', ');
                const prompt = `以下の日本株コードの正式な銘柄名を教えてください。コード:銘柄名 の形式で1行ずつ出力してください。余計な説明不要。\n${codeList}`;
                const resp = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${getApiKey()}`, {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });
                const d = await resp.json();
                const lines = d.candidates[0].content.parts[0].text.split('\n');
                lines.forEach(line => {
                    const m = line.match(/(\d{4})[：:]\s*(.+)/);
                    if (m) {
                        const idx = csvPendingRows.findIndex(r => r.code === m[1]);
                        if (idx >= 0) { csvPendingRows[idx].name = m[2].trim(); csvPendingRows[idx].needsNameLookup = false; }
                    }
                });
                renderCsvList();
                sub.textContent = `${csvPendingRows.length}件検出（新規:${newCount}件 / 重複:${dupCount}件）`;
            } catch(e) { console.error(e); }
        }
    }

    function renderCsvList() {
        const list = document.getElementById('csv-preview-list');
        list.innerHTML = csvPendingRows.map((row, i) => `
            <div class="csv-row">
                <input type="checkbox" class="chk" id="csv-chk-${i}" ${row.isDup ? '' : 'checked'} ${row.isDup ? 'title="すでに登録済み"' : ''}>
                <span class="code-badge">${row.code}</span>
                <span style="flex:1; color:${row.isDup ? '#8b949e' : '#e6edf3'}">${row.name}</span>
                ${row.isDup ? '<span class="dup-badge">登録済</span>' : ''}
            </div>
        `).join('');
    }

    function closeCsvModal() {
        document.getElementById('csv-modal').classList.remove('open');
        csvPendingRows = [];
    }

    function toggleSelectAll() {
        const checkboxes = document.querySelectorAll('#csv-preview-list .chk');
        const allChecked = Array.from(checkboxes).every(c => c.checked);
        checkboxes.forEach(c => c.checked = !allChecked);
    }

    function confirmCsvImport() {
        let addedCount = 0;
        csvPendingRows.forEach((row, i) => {
            const chk = document.getElementById(`csv-chk-${i}`);
            if (chk && chk.checked && !appData.stocks.some(s => s.code === row.code)) {
                appData.stocks.push({ id: Date.now() + Math.random(), name: row.name, code: row.code });
                addedCount++;
            }
        });
        save(); render();
        closeCsvModal();
        if (addedCount > 0) alert(`${addedCount}件の銘柄を登録しました！✨`);
        else alert("新規追加はありませんでした。");
    }

    // ===== 手動追加 =====
    function manualAdd() {
        const name = prompt("銘柄名を入力してください（例：ヤマハ発動機）");
        if (!name) return;
        const code = prompt("4桁のコードを入力してください（例：7272）");
        if (!code || !/^\d{4}$/.test(code)) { alert("コードは4桁の数字で入力してください。"); return; }
        appData.stocks.push({ id: Date.now() + Math.random(), name, code });
        save(); render();
    }

    // ===== 描画 =====
    function render() {
        const container = document.getElementById('stock-list-container');
        document.getElementById('stock-count').textContent = `登録銘柄：${appData.stocks.length}件`;
        if (appData.stocks.length === 0) {
            container.innerHTML = '<div style="padding:50px; text-align:center; color:#8b949e; font-size:13px;">スクショ・CSVを読み込むか、<br>手動ボタンで銘柄を登録してください📸</div>';
            return;
        }
        container.innerHTML = appData.stocks.map(s => {
            const safeId = String(s.id);
            return `
            <div class="stock-item">
                <div class="stock-info" data-id="${safeId}" onclick="openConsultById(this.dataset.id)">
                    <div class="stock-name">${escHtml(s.name)}</div>
                    <div class="stock-code">コード: ${escHtml(s.code)}</div>
                </div>
                <div style="display:flex; gap:10px;">
                    <button class="action-btn" style="border-color:#58a6ff; color:#58a6ff;" data-id="${safeId}" onclick="openConsultById(this.dataset.id)">分析 📈</button>
                    <button class="action-btn" data-id="${safeId}" onclick="deleteStock(this.dataset.id)">🗑</button>
                </div>
            </div>`;
        }).join('');
    }
    function escHtml(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
    function openConsultById(id) {
        const s = appData.stocks.find(s => String(s.id) === id);
        if (s) openConsult(s.name, s.code);
    }

    function openConsult(name, code) {
        currentStock = { name, code };
        document.getElementById('chat-header-title').innerText = `${name} (${code})`;
        document.getElementById('chat-messages').innerHTML = `<div class="ai-msg">「${name}」ですね！\n楽天証券のチャート画像をアップロードしてください。黄金ルールで勝率を分析します！📊</div>`;
        showPage('page-chat');
    }

    function updateChatFileStatus(input) {
        selectedChatFile = input.files[0];
        document.getElementById('chat-file-ok').innerText = selectedChatFile ? "✅ チャート画像OK！" : "";
    }

    async function handleSend() {
        if (!selectedChatFile) { alert("チャート画像を選んでくださいね！📸"); return; }
        if (!getApiKey()) { alert("先にAPIキーを設定してください🔑"); showPage('page-apikey'); return; }
        const textInput = document.getElementById('user-text');
        const messages = document.getElementById('chat-messages');
        const loading = document.getElementById('loading');

        const userText = textInput.value || "黄金ルールで分析して！";
        const userDiv = document.createElement('div'); userDiv.className = 'user-msg'; userDiv.textContent = userText;
        const img = document.createElement('img'); img.className = 'preview-img'; img.src = URL.createObjectURL(selectedChatFile);
        userDiv.appendChild(img); messages.appendChild(userDiv);
        
        loading.style.display = 'flex';
        messages.scrollTop = messages.scrollHeight;

        try {
            const prompt = `あなたは「黄金ルール」の投資顧問です。銘柄：${currentStock.name} (${currentStock.code}) のチャート画像から、GMMA、ボリンジャーバンド、RSI等のテクニカル指標を読み取り、今後の予測と戦略をズバッと回答してください。`;
            const base64 = await toBase64(selectedChatFile);
            const mimeType = selectedChatFile.type || 'image/jpeg';
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${getApiKey()}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: mimeType, data: base64.split(',')[1] } }] }] })
            });
            const data = await response.json();

            // APIレベルのエラーを捕捉
            if (!response.ok || data.error) {
                const errMsg = data.error?.message || `HTTP ${response.status}`;
                const errDiv = document.createElement('div');
                errDiv.className = 'ai-msg';
                errDiv.style.borderLeftColor = '#f85149';
                errDiv.textContent = `⚠️ APIエラー：${errMsg}`;
                messages.appendChild(errDiv);
                return;
            }

            // candidates が空のケース（Safety フィルター等）
            if (!data.candidates || data.candidates.length === 0) {
                const reason = data.promptFeedback?.blockReason || '不明';
                const errDiv = document.createElement('div');
                errDiv.className = 'ai-msg';
                errDiv.style.borderLeftColor = '#f0883e';
                errDiv.textContent = `⚠️ 応答を受け取れませんでした（理由: ${reason}）\nチャート画像を変えて再試行してください。`;
                messages.appendChild(errDiv);
                return;
            }

            const aiDiv = document.createElement('div');
            aiDiv.className = 'ai-msg';
            aiDiv.textContent = data.candidates[0].content.parts[0].text;
            messages.appendChild(aiDiv);
        } catch (e) {
            const errDiv = document.createElement('div');
            errDiv.className = 'ai-msg';
            errDiv.style.borderLeftColor = '#f85149';
            errDiv.textContent = `⚠️ 通信エラー：${e.message}\nネットワーク接続を確認してください。`;
            messages.appendChild(errDiv);
        }
        finally {
            loading.style.display = 'none';
            selectedChatFile = null;
            document.getElementById('chat-file-ok').innerText = "";
            textInput.value = "";
            messages.scrollTop = messages.scrollHeight;
        }
    }

    const toBase64 = f => new Promise((res, rej) => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); });
    function clearAllData() { if (confirm("銘柄リストをすべて削除しますか？")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }
    function deleteStock(id) { if (confirm("この銘柄を削除しますか？")) { appData.stocks = appData.stocks.filter(s => String(s.id) !== String(id)); save(); render(); } }

    // 起動時：APIキーがなければ設定画面、あればリスト画面
    function init() {
        render();
        updateKeyBtnState();
        if (!getApiKey()) {
            showPage('page-apikey');
        } else {
            showPage('page-list');
        }
    }
    init();
</script>
</body>
</html>

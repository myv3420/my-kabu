<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>株管理アプリ Pro</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/Sortable/1.15.0/Sortable.min.js"></script>
    <style>
        body { margin: 0; background-color: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        .header { padding: 12px 15px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-weight: bold; color: #58a6ff; font-size: 15px; }

        /* ボタンのはみ出し防止とデザイン修正 */
        .import-section { padding: 15px; background: #1c2128; border-bottom: 1px solid #30363d; text-align: center; box-sizing: border-box; }
        .csv-label-btn { 
            display: inline-block; 
            width: 100%; 
            max-width: 340px; /* はみ出し防止 */
            padding: 14px; 
            background: #238636; 
            color: white; 
            border-radius: 10px; 
            font-weight: bold; 
            font-size: 14px; 
            cursor: pointer; 
            border: none;
            box-sizing: border-box;
        }
        #csv-file-input { display: none; }

        .group-bar { display: flex; background: #161b22; border-bottom: 1px solid #30363d; overflow-x: auto; }
        .group-tab { padding: 12px 18px; font-size: 13px; color: #8b949e; white-space: nowrap; border-bottom: 3px solid transparent; }
        .group-tab.active { color: #58a6ff; border-bottom: 3px solid #2962ff; background: rgba(88, 166, 255, 0.1); font-weight: bold; }

        .stock-list-container { flex: 1; overflow-y: auto; }
        .stock-item { padding: 15px; border-bottom: 1px solid #21262d; }
        .stock-main { display: flex; justify-content: space-between; align-items: center; }
        .stock-name { font-weight: bold; font-size: 14px; line-height: 1.4; }
        .price { font-size: 18px; font-weight: bold; }
        .yield-badge { font-size: 10px; background: #238636; color: white; padding: 2px 6px; border-radius: 4px; margin-left: 5px; vertical-align: middle; }

        .item-controls { display: flex; gap: 10px; margin-top: 10px; }
        .mini-btn { font-size: 11px; padding: 7px 12px; border-radius: 6px; border: 1px solid #30363d; background: #161b22; color: #c9d1d9; }

        #status-msg { font-size: 11px; color: #8b949e; margin-top: 8px; display: block; }

        /* 移動メニュー */
        #move-menu { position: fixed; bottom: -100%; left: 0; width: 100%; background: #161b22; transition: 0.3s; z-index: 200; padding: 20px; border-radius: 20px 20px 0 0; box-sizing: border-box; }
        #move-menu.active { bottom: 0; }
        .menu-btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; background: #21262d; color: white; border: 1px solid #30363d; border-radius: 12px; text-align: center; }
        .overlay-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 199; }
    </style>
</head>
<body>

    <div class="header">
        <div class="header-title">📊 株管理アプリ Pro</div>
        <button style="font-size:11px; background:#30363d; color:white; border:none; padding:8px 12px; border-radius:6px;" onclick="updateAllPrices()">株価更新 ↻</button>
    </div>

    <div class="import-section">
        <label for="csv-file-input" class="csv-label-btn">
            📁 楽天証券のCSVを選択
        </label>
        <input type="file" id="csv-file-input" accept=".csv" onchange="importCSV(this)">
        <span id="status-msg">※「持ち株」タブに取り込まれます</span>
    </div>

    <div class="group-bar" id="group-bar"></div>
    <div class="stock-list-container" id="stock-list-container"></div>

    <div class="overlay-bg" id="overlay-bg" onclick="closeMoveMenu()"></div>
    <div id="move-menu">
        <div style="color:#8b949e; text-align:center; margin-bottom:15px;">移動先のタブを選択</div>
        <div id="menu-options"></div>
        <button class="menu-btn" style="background:#30363d;" onclick="closeMoveMenu()">キャンセル</button>
    </div>

    <script>
        const STORAGE_KEY = 'stock-app-v11-4-gh';
        
        let appData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
            groups: [
                { id: 999, name: '持ち株', stocks: [] },
                { id: 1, name: '高配当株', stocks: [] }, 
                { id: 2, name: '監視銘柄', stocks: [] }
            ],
            activeGroupId: 999
        };
        let pendingMoveStock = null;

        function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }

        // CSV読み込み（文字化け対策強化版）
        function importCSV(input) {
            const file = input.files[0];
            if (!file) return;

            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    // Shift-JISを正しくデコード
                    const arrayBuffer = e.target.result;
                    const decoder = new TextDecoder('shift-jis');
                    const text = decoder.decode(arrayBuffer);
                    
                    const lines = text.split('\n');
                    let targetG = appData.groups.find(x => x.id === 999);
                    
                    let count = 0;
                    lines.forEach(line => {
                        const c = line.split(',').map(v => v.replace(/"/g, '').trim());
                        const code = c[0], name = c[1], yieldVal = c[12]; 
                        // 4桁の銘柄コードがある行のみ抽出
                        if (/^\d{4}$/.test(code) && !targetG.stocks.some(s => s.code === code)) {
                            targetG.stocks.push({ id: Date.now() + count, name: name, code: code, yield: yieldVal || "0", lastPrice: null });
                            count++;
                        }
                    });
                    alert(`${count}件の銘柄を正しく読み込みました！`);
                    appData.activeGroupId = 999;
                    save(); render();
                } catch (err) {
                    alert("読み込みエラー: ファイル形式を確認してください");
                }
                input.value = "";
            };
            // ここを readAsArrayBuffer に変更してデコーダーに渡す
            reader.readAsArrayBuffer(file);
        }

        async function updateAllPrices() {
            const g = appData.groups.find(x => x.id === appData.activeGroupId);
            if (!g || g.stocks.length === 0) return;
            document.getElementById('status-msg').innerText = "取得中...";
            for (let s of g.stocks) {
                try {
                    const res = await fetch(`https://query1.finance.yahoo.com/v7/finance/quote?symbols=${s.code}.T`);
                    const data = await res.json();
                    const q = data.quoteResponse.result[0];
                    s.lastPrice = {
                        price: q.regularMarketPrice.toLocaleString(),
                        change: (q.regularMarketChange > 0 ? "+" : "") + q.regularMarketChange.toFixed(1)
                    };
                } catch (e) { }
            }
            document.getElementById('status-msg').innerText = "更新完了";
            save(); render();
        }

        function render() {
            const bar = document.getElementById('group-bar');
            bar.innerHTML = appData.groups.map(g => `
                <div class="group-tab ${g.id === appData.activeGroupId ? 'active' : ''}" onclick="switchGroup(${g.id})">${g.name}</div>
            `).join('') + `<div style="padding:12px; color:#238636;" onclick="addGroup()">＋</div>`;

            const container = document.getElementById('stock-list-container');
            const g = appData.groups.find(x => x.id === appData.activeGroupId);
            
            if (g.stocks.length === 0) {
                container.innerHTML = `<div style="padding:100px 20px; text-align:center; color:#8b949e; font-size:14px;">銘柄がありません。<br>CSVから読み込むか、手動で追加してください。</div><div style="text-align:center;"><button class="mini-btn" onclick="addManual(${g.id})">＋ 銘柄を手動追加</button></div>`;
            } else {
                container.innerHTML = g.stocks.map((s) => `
                    <div class="stock-item">
                        <div class="stock-main">
                            <div>
                                <div class="stock-name" onclick="renameStock(${g.id}, ${s.id})">${s.name}${s.yield !== "0" ? `<span class="yield-badge">${s.yield}%</span>` : ''}</div>
                                <div style="font-size:12px; color:#8b949e;">${s.code}</div>
                            </div>
                            <div style="text-align:right">
                                <div class="price">${s.lastPrice ? s.lastPrice.price : '---'}</div>
                                <div style="font-size:11px; color:${s.lastPrice?.change.includes('+') ? '#3fb950' : '#f85149'}">${s.lastPrice ? s.lastPrice.change : ''}</div>
                            </div>
                        </div>
                        <div class="item-controls">
                            <span class="mini-btn" onclick="openMoveMenu(${g.id}, ${s.id})" style="color:#d29922; border-color:#d29922;">振り分け</span>
                            <span class="mini-btn" onclick="deleteStock(${g.id}, ${s.id})">削除</span>
                        </div>
                    </div>
                `).join('') + `<div style="padding:40px; text-align:center; color:#58a6ff;" onclick="addManual(${g.id})">＋ 手動追加</div>`;
            }
        }

        // 基本機能
        function switchGroup(id) { appData.activeGroupId = id; render(); }
        function addGroup() { const n = prompt("新しいタブ名"); if (n) { appData.groups.push({ id: Date.now(), name: n, stocks: [] }); save(); render(); } }
        function deleteStock(gId, sId) { if (confirm("削除しますか？")) { const g = appData.groups.find(x => x.id === gId); g.stocks = g.stocks.filter(s => s.id !== sId); save(); render(); } }
        function renameStock(gId, sId) { 
            const s = appData.groups.find(g => g.id === gId).stocks.find(x => x.id === sId);
            const n = prompt("名前を変更", s.name);
            if (n) { s.name = n; save(); render(); }
        }
        function addManual(gId) { const c = prompt("4桁の銘柄コードを入力"); if (c) { appData.groups.find(x => x.id === gId).stocks.push({ id: Date.now(), name: "新規銘柄", code: c, yield: "0", lastPrice: null }); save(); render(); updateAllPrices(); } }

        function openMoveMenu(gId, sId) {
            pendingMoveStock = { gId, sId };
            const opts = document.getElementById('menu-options');
            opts.innerHTML = appData.groups.filter(g => g.id !== gId).map(g => `
                <div class="menu-btn" onclick="executeMove(${g.id})">${g.name} へ移動</div>
            `).join('');
            document.getElementById('overlay-bg').style.display = 'block';
            document.getElementById('move-menu').classList.add('active');
        }
        function closeMoveMenu() { document.getElementById('overlay-bg').style.display = 'none'; document.getElementById('move-menu').classList.remove('active'); }
        function executeMove(targetId) {
            const { gId, sId } = pendingMoveStock;
            const fromG = appData.groups.find(x => x.id === gId);
            const toG = appData.groups.find(x => x.id === targetId);
            const idx = fromG.stocks.findIndex(x => x.id === sId);
            toG.stocks.push(fromG.stocks.splice(idx, 1)[0]);
            save(); render(); closeMoveMenu();
        }

        render();
    </script>
</body>
</html>

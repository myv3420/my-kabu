<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>株管理 ＆ 黄金ルールAI</title>
    <style>
        /* 基本スタイル */
        body { margin: 0; background-color: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
        .page { display: none; flex-direction: column; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; }
        .page.active { display: flex; }

        /* ヘッダー */
        .header { padding: 12px 15px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; z-index: 10; }
        .header-title { font-weight: bold; color: #58a6ff; font-size: 14px; }

        /* --- 銘柄一覧ページ --- */
        .import-section { padding: 15px; background: #1c2128; border-bottom: 1px solid #30363d; text-align: center; }
        .csv-label-btn { display: inline-block; width: 100%; max-width: 300px; padding: 12px; background: #238636; color: white; border-radius: 8px; font-weight: bold; font-size: 14px; cursor: pointer; }
        .group-bar { display: flex; background: #161b22; border-bottom: 1px solid #30363d; overflow-x: auto; scrollbar-width: none; }
        .group-tab { padding: 12px 18px; font-size: 13px; color: #8b949e; white-space: nowrap; border-bottom: 3px solid transparent; }
        .group-tab.active { color: #58a6ff; border-bottom: 3px solid #2962ff; background: rgba(88, 166, 255, 0.1); font-weight: bold; }
        .stock-list-container { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .stock-item { padding: 15px; border-bottom: 1px solid #21262d; }
        .stock-name { font-weight: bold; font-size: 15px; color: #58a6ff; margin-bottom: 5px; }
        .item-controls { display: flex; gap: 8px; margin-top: 10px; }
        .action-btn { font-size: 11px; padding: 7px 10px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; cursor: pointer; }

        /* --- 相談チャットページ --- */
        #chat-messages { flex: 1; overflow-y: auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; background: #0d1117; }
        .ai-msg { background: #21262d; padding: 15px; border-radius: 15px 15px 15px 5px; border-left: 4px solid #2962ff; align-self: flex-start; max-width: 90%; white-space: pre-wrap; font-size: 14px; line-height: 1.6; }
        .user-msg { background: #238636; color: white; padding: 12px; border-radius: 15px 15px 5px 15px; align-self: flex-end; max-width: 85%; font-size: 14px; }
        .preview-img { max-width: 100%; border-radius: 10px; margin-top: 8px; border: 1px solid #30363d; }
        .chat-controls { padding: 15px; background: #161b22; border-top: 1px solid #30363d; }
        textarea { width: 100%; background: #0d1117; border: 1px solid #30363d; color: white; padding: 12px; border-radius: 10px; resize: none; font-size: 16px; box-sizing: border-box; }
        .chat-btns { display: flex; gap: 10px; margin-top: 10px; }
        .btn-send { flex: 1; background: #2962ff; color: white; border: none; border-radius: 8px; font-weight: bold; }

        /* 共通 */
        #loading { position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%); background: rgba(0,0,0,0.8); color: #58a6ff; padding: 20px; border-radius: 10px; display: none; z-index: 1000; }
        .overlay-bg { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.8); display: none; z-index: 199; }
        #move-menu { position: fixed; bottom: -100%; left: 0; width: 100%; background: #161b22; transition: 0.3s; z-index: 200; padding: 20px; border-radius: 20px 20px 0 0; box-sizing: border-box; }
        #move-menu.active { bottom: 0; }
        .menu-btn { display: block; width: 100%; padding: 15px; margin-bottom: 10px; background: #21262d; color: white; border: 1px solid #30363d; border-radius: 10px; text-align: center; }
    </style>
</head>
<body>

<div id="loading">黄金ルール適用中...🔍✨</div>

<div id="page-list" class="page active">
    <div class="header">
        <div class="header-title">📊 株管理 ＆ 黄金ルールAI</div>
        <button style="font-size:10px; background:#da3633; color:white; border:none; padding:6px 10px; border-radius:6px;" onclick="clearAllData()">リセット</button>
    </div>
    <div class="import-section">
        <label for="csv-file-input" class="csv-label-btn">📁 楽天証券のCSVを読み込む</label>
        <input type="file" id="csv-file-input" accept=".csv" onchange="importCSV(this)">
    </div>
    <div class="group-bar" id="group-bar"></div>
    <div class="stock-list-container" id="stock-list-container"></div>
</div>

<div id="page-chat" class="page">
    <div class="header">
        <button onclick="showPage('page-list')" style="background:none; border:none; color:#58a6ff; font-size:14px;">◀ 戻る</button>
        <div id="chat-header-title" class="header-title">黄金ルール分析</div>
        <div style="width:40px;"></div>
    </div>
    <div id="chat-messages"></div>
    <div class="chat-controls">
        <textarea id="user-text" rows="2" placeholder="質問を入力..."></textarea>
        <div id="file-status" style="font-size:11px; color:#aff5b4; margin-top:5px; text-align:center;"></div>
        <div class="chat-btns">
            <label class="action-btn" style="flex:1; background:#30363d; text-align:center; padding:12px;">
                📸 画像を選ぶ
                <input type="file" id="image-input" accept="image/*" style="display:none;">
            </label>
            <button class="btn-send" onclick="handleSend()">分析開始</button>
        </div>
    </div>
</div>

<div class="overlay-bg" id="overlay-bg" onclick="closeMoveMenu()"></div>
<div id="move-menu">
    <div id="menu-options"></div>
    <button class="menu-btn" style="background:#30363d;" onclick="closeMoveMenu()">キャンセル</button>
</div>

<script>
    const API_KEY = 'AIzaSyBa2SEsc_y-ooTnXUwKjVORk8gvKOwtbsg';
    const STORAGE_KEY = 'stock_app_v12_final';
    let appData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || {
        groups: [{ id: 999, name: '持ち株', stocks: [] }, { id: 1, name: '高配当株', stocks: [] }, { id: 2, name: '監視銘柄', stocks: [] }],
        activeGroupId: 999
    };
    let currentStock = null;
    let selectedFile = null;

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }

    // --- 画面切り替え ---
    function showPage(pageId) {
        document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
        document.getElementById(pageId).classList.add('active');
    }

    // --- 相談画面を開く ---
    function openConsult(name, code) {
        currentStock = { name, code };
        document.getElementById('chat-header-title').innerText = `${name} (${code})`;
        document.getElementById('chat-messages').innerHTML = `<div class="ai-msg">「${name}」の分析準備OK！📊✨<br>楽天証券のチャート画像を送ってください。黄金ルールで分析します！📈</div>`;
        showPage('page-chat');
    }

    // --- CSV読み込み (文字化け対策版) ---
    function importCSV(input) {
        const file = input.files[0];
        if (!file) return;
        const reader = new FileReader();
        reader.onload = function(e) {
            const decoder = new TextDecoder('shift-jis');
            const text = decoder.decode(new Uint8Array(e.target.result));
            const lines = text.split(/\r\n|\n/);
            let targetG = appData.groups.find(x => x.id === 999);
            let count = 0;
            lines.forEach(line => {
                const c = line.split(',').map(v => v.replace(/"/g, '').trim());
                if (/^\d{4}$/.test(c[0]) && !targetG.stocks.some(s => s.code === c[0])) {
                    targetG.stocks.push({ id: Date.now() + count, name: c[1] || "不明", code: c[0], yield: c[12] || "0" });
                    count++;
                }
            });
            alert(`${count}件取り込みました！`);
            save(); render();
        };
        reader.readAsArrayBuffer(file);
    }

    function render() {
        const bar = document.getElementById('group-bar');
        bar.innerHTML = appData.groups.map(g => `<div class="group-tab ${g.id === appData.activeGroupId ? 'active' : ''}" onclick="switchGroup(${g.id})">${g.name}</div>`).join('') + `<div style="padding:12px; color:#238636;" onclick="addGroup()">＋</div>`;
        const container = document.getElementById('stock-list-container');
        const g = appData.groups.find(x => x.id === appData.activeGroupId);
        container.innerHTML = g.stocks.map((s) => `
            <div class="stock-item">
                <div class="stock-name" onclick="openConsult('${s.name}', '${s.code}')">${s.name} <span class="yield-badge">${s.yield}%</span></div>
                <div style="font-size:12px; color:#8b949e; margin-bottom:8px;">コード: ${s.code}</div>
                <div class="item-controls">
                    <button class="action-btn" style="border-color:#58a6ff; color:#58a6ff;" onclick="openConsult('${s.name}', '${s.code}')">📝 黄金ルール分析</button>
                    <button class="action-btn" onclick="openMoveMenu(${g.id}, ${s.id})">📂 移動</button>
                    <button class="action-btn" onclick="deleteStock(${g.id}, ${s.id})">🗑 削除</button>
                </div>
            </div>
        `).join('') + `<div style="padding:40px; text-align:center; color:#58a6ff;" onclick="addManual(${g.id})">＋ 手動追加</div>`;
    }

    // --- チャット処理 ---
    document.getElementById('image-input').addEventListener('change', (e) => {
        selectedFile = e.target.files[0];
        document.getElementById('file-status').innerText = selectedFile ? "✅ 画像選択済み" : "";
    });

    async function handleSend() {
        if (!selectedFile) { alert("チャート画像を選んでください！📸"); return; }
        const textInput = document.getElementById('user-text');
        const messages = document.getElementById('chat-messages');
        const loading = document.getElementById('loading');

        const userText = textInput.value || "このチャートを分析して！";
        const userDiv = document.createElement('div');
        userDiv.className = 'user-msg';
        userDiv.textContent = userText;
        const img = document.createElement('img');
        img.className = 'preview-img';
        img.src = URL.createObjectURL(selectedFile);
        userDiv.appendChild(img);
        messages.appendChild(userDiv);
        
        loading.style.display = 'block';
        messages.scrollTop = messages.scrollHeight;

        try {
            const prompt = `銘柄：${currentStock.name} (${currentStock.code})
あなたは黄金ルールを熟知したプロのアナリストです。画像からGMMA、ボリバン、RSI等を推測し、以下の構成で回答してください。
1. 現在のトレンド状態 📈
2. 黄金ルールの指標読み取り
3. 具体的な戦略（損切り・利確目安）
4. アドバイス
質問：${userText}`;

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: selectedFile.type, data: (await toBase64(selectedFile)).split(',')[1] } }] }] })
            });
            const data = await response.json();
            const aiResponse = data.candidates[0].content.parts[0].text;
            const aiDiv = document.createElement('div');
            aiDiv.className = 'ai-msg';
            aiDiv.textContent = aiResponse;
            messages.appendChild(aiDiv);
        } catch (e) {
            alert("エラーが発生しました。");
        } finally {
            loading.style.display = 'none';
            selectedFile = null;
            document.getElementById('file-status').innerText = "";
            textInput.value = "";
            messages.scrollTop = messages.scrollHeight;
        }
    }

    const toBase64 = f => new Promise((res, rej) => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); });

    // --- その他基本機能 ---
    function switchGroup(id) { appData.activeGroupId = id; render(); }
    function clearAllData() { if (confirm("リセットしますか？")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }
    function deleteStock(gId, sId) { if (confirm("削除しますか？")) { const g = appData.groups.find(x => x.id === gId); g.stocks = g.stocks.filter(s => s.id !== sId); save(); render(); } }
    function addManual(gId) { const c = prompt("4桁コード"); if (c) { appData.groups.find(x => x.id === gId).stocks.push({ id: Date.now(), name: "手動追加", code: c, yield: "0" }); save(); render(); } }
    function addGroup() { const n = prompt("タブ名"); if (n) { appData.groups.push({ id: Date.now(), name: n, stocks: [] }); save(); render(); } }

    let pendingMoveStock = null;
    function openMoveMenu(gId, sId) {
        pendingMoveStock = { gId, sId };
        const opts = document.getElementById('menu-options');
        opts.innerHTML = appData.groups.filter(g => g.id !== gId).map(g => `<div class="menu-btn" onclick="executeMove(${g.id})">${g.name} へ移動</div>`).join('');
        document.getElementById('overlay-bg').style.display = 'block';
        document.getElementById('move-menu').classList.add('active');
    }
    function closeMoveMenu() { document.getElementById('overlay-bg').style.display = 'none'; document.getElementById('move-menu').classList.remove('active'); }
    function executeMove(targetId) {
        const { gId, sId } = pendingMoveStock;
        const fromG = appData.groups.find(x => x.id === gId);
        const toG = appData.groups.find(x => x.id === targetId);
        const idx = fromG.stocks.findIndex(x => x.id === sId);
        toG.stocks.push(fromG.stocks.splice(idx, 1)[0]);
        save(); render(); closeMoveMenu();
    }

    render();
</script>
</body>
</html>

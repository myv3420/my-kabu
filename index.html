<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>株管理 ＆ 黄金ルールAI v14.1</title>
    <style>
        body { margin: 0; background-color: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; }
        .header { padding: 15px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; position: sticky; top: 0; z-index: 100; }
        .header-title { font-weight: bold; color: #58a6ff; }
        
        .upload-zone { padding: 20px; background: #1c2128; border-bottom: 1px solid #30363d; text-align: center; }
        .btn-main { display: block; padding: 15px; background: #238636; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 15px; }
        
        .stock-card { background: #161b22; margin: 10px; padding: 15px; border-radius: 10px; border: 1px solid #30363d; }
        .stock-header { display: flex; justify-content: space-between; margin-bottom: 10px; }
        .stock-name { font-weight: bold; color: #58a6ff; font-size: 16px; }
        .grid-data { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; font-size: 12px; margin-bottom: 10px; }
        .label { color: #8b949e; }
        .value { text-align: right; font-family: monospace; }
        
        /* 分析結果エリア */
        .analysis-box { background: #0d1117; padding: 10px; border-radius: 6px; border-left: 4px solid #f1e05a; font-size: 12px; line-height: 1.5; color: #c9d1d9; }
        .score-badge { display: inline-block; padding: 2px 8px; border-radius: 12px; background: #f1e05a; color: #000; font-weight: bold; margin-bottom: 5px; }

        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13,17,23,0.95); display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .loader { width: 40px; height: 40px; border: 4px solid #30363d; border-top: 4px solid #58a6ff; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading">
    <div class="loader"></div>
    <p id="loading-text" style="margin-top:15px; font-weight:bold;">AIが黄金ルールで分析中...🧠✨</p>
</div>

<div class="header">
    <div class="header-title">📊 黄金ルールAI分析 v14.1</div>
    <button style="background:none; border:none; color:#da3633; font-size:12px;" onclick="clearAll()">初期化</button>
</div>

<div class="upload-zone">
    <label class="btn-main">📸 スクショを2枚選んで分析
        <input type="file" id="ocr-input" accept="image/*" multiple style="display:none;" onchange="processAndAnalyze(this)">
    </label>
    <p style="font-size:11px; color:#8b949e; margin-top:10px;">
        1.「数量・単価」画面<br>
        2.「PER・利回り」画面<br>
        を同時に選択してください！
    </p>
</div>

<div id="list-container"></div>

<script>
    const API_KEY = 'AIzaSyBa2SEsc_y-ooTnXUwKjVORk8gvKOwtbsg';
    const STORAGE_KEY = 'stock_analysis_v14_1';
    let stocks = JSON.parse(localStorage.getItem(STORAGE_KEY)) || [];

    async function processAndAnalyze(input) {
        const files = Array.from(input.files);
        if (files.length < 1) return;
        document.getElementById('loading').style.display = 'flex';

        try {
            // 解析と分析を一度に行うプロンプト
            const prompt = `あなたは配当株投資の専門家です。
            送られた複数のスクショからデータを統合し、各銘柄を以下の形式のJSONで返してください。
            
            【黄金ルール分析基準】
            ・配当利回り4%以上なら高評価
            ・PER15倍以下、PBR1倍以下なら割安
            ・それらを踏まえた「AI分析コメント（30文字程度）」と「総合スコア（0-100）」を作成してください。

            【出力形式】
            {"stocks": [{"code": "4桁", "name": "...", "quantity": 0, "avgPrice": 0, "currentPrice": 0, "per": 0, "pbr": 0, "yield": 0, "score": 85, "comment": "..."}]}`;

            const parts = [{ text: prompt }];
            for (const file of files) {
                const b64 = await toBase64(file);
                parts.push({ inline_data: { mime_type: file.type, data: b64.split(',')[1] } });
            }

            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ contents: [{ parts }] })
            });

            const resJson = await response.json();
            const text = resJson.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
            const newData = JSON.parse(text).stocks;

            stocks = newData; // 今回は最新の分析結果を表示
            localStorage.setItem(STORAGE_KEY, JSON.stringify(stocks));
            render();
        } catch (e) {
            console.error(e);
            alert("分析エラーが発生しました。スクショが鮮明か確認してください。");
        } finally {
            document.getElementById('loading').style.display = 'none';
            input.value = "";
        }
    }

    function render() {
        const container = document.getElementById('list-container');
        container.innerHTML = stocks.map(s => `
            <div class="stock-card">
                <div class="stock-header">
                    <span class="stock-name">${s.name}</span>
                    <span style="font-size:12px; color:#8b949e;">${s.code}</span>
                </div>
                <div class="grid-data">
                    <span class="label">保有数</span><span class="value">${s.quantity}株</span>
                    <span class="label">利回り</span><span class="value" style="color:#58a6ff;">${s.yield}%</span>
                    <span class="label">PER/PBR</span><span class="value">${s.per} / ${s.pbr}</span>
                </div>
                <div class="analysis-box">
                    <div class="score-badge">AIスコア: ${s.score}点</div>
                    <div>${s.comment}</div>
                </div>
            </div>
        `).join('') || '<p style="text-align:center; color:#8b949e; margin-top:50px;">スクショを選んで分析を開始してください📸</p>';
    }

    const toBase64 = f => new Promise(res => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); });
    function clearAll() { if(confirm("データをリセットしますか？")) { localStorage.removeItem(STORAGE_KEY); stocks = []; render(); } }

    render();
</script>
</body>
</html>

<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>株管理 ＆ 黄金ルールAI v13.9</title>
    <style>
        body { margin: 0; background-color: #0d1117; color: #e6edf3; font-family: -apple-system, sans-serif; height: 100vh; overflow: hidden; }
        .page { display: none; flex-direction: column; height: 100vh; width: 100%; position: absolute; top: 0; left: 0; }
        .page.active { display: flex; }
        .header { padding: 12px 15px; background: #161b22; border-bottom: 1px solid #30363d; display: flex; justify-content: space-between; align-items: center; }
        .header-title { font-weight: bold; color: #58a6ff; font-size: 14px; }
        
        .import-section { padding: 15px; background: #1c2128; border-bottom: 1px solid #30363d; text-align: center; }
        .ocr-label-btn { display: block; padding: 15px; background: #238636; color: white; border-radius: 8px; font-weight: bold; cursor: pointer; border: none; font-size: 15px; box-shadow: 0 4px 15px rgba(35,134,54,0.3); }
        .manual-add-btn { display: block; margin-top: 10px; padding: 8px; color: #8b949e; font-size: 12px; text-decoration: underline; cursor: pointer; }

        .stock-list-container { flex: 1; overflow-y: auto; padding-bottom: 80px; }
        .stock-item { padding: 15px; border-bottom: 1px solid #21262d; display: flex; justify-content: space-between; align-items: center; }
        .stock-name { font-weight: bold; font-size: 15px; color: #c9d1d9; }
        .stock-code { font-size: 12px; color: #58a6ff; font-family: monospace; }
        .action-btn { font-size: 11px; padding: 8px 12px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; }

        #loading { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(13,17,23,0.95); color: #58a6ff; display: none; flex-direction: column; justify-content: center; align-items: center; z-index: 2000; }
        .loader-spin { width: 40px; height: 40px; border: 4px solid #30363d; border-top: 4px solid #58a6ff; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

<div id="loading">
    <div class="loader-spin"></div>
    <div id="loading-text" style="font-weight:bold;">AIが画像を1文字ずつ解析中...🕵️‍♂️</div>
    <div style="font-size:12px; color:#8b949e; margin-top:10px;">「ここ」のチャットと同じ高精度モードです</div>
</div>

<div id="page-list" class="page active">
    <div class="header">
        <div class="header-title">📊 黄金ルールAI v13.9</div>
        <button style="background:none; border:none; color:#f85149; font-size:11px;" onclick="clearAll()">初期化</button>
    </div>
    <div class="import-section">
        <label class="ocr-label-btn">📸 スクショを読み込ませる
            <input type="file" id="ocr-input" accept="image/*" multiple style="display:none;" onchange="highPrecisionImport(this)">
        </label>
        <div class="manual-add-btn" onclick="manualAdd()">手動で銘柄を追加</div>
    </div>
    <div id="stock-list-container" class="stock-list-container"></div>
</div>

<div id="page-chat" class="page">
    <div class="header">
        <button onclick="showPage('page-list')" style="background:none; border:none; color:#58a6ff;">◀ 戻る</button>
        <div id="chat-header-title" class="header-title">分析</div>
        <div style="width:40px;"></div>
    </div>
    <div id="chat-messages" style="flex:1; overflow-y:auto; padding:15px; background:#0d1117; display:flex; flex-direction:column; gap:15px;"></div>
</div>

<script>
    const API_KEY = 'AIzaSyBa2SEsc_y-ooTnXUwKjVORk8gvKOwtbsg';
    const STORAGE_KEY = 'stock_v13_9_high';
    let appData = JSON.parse(localStorage.getItem(STORAGE_KEY)) || { stocks: [] };

    function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(appData)); }
    function showPage(id) { document.querySelectorAll('.page').forEach(p => p.classList.remove('active')); document.getElementById(id).classList.add('active'); }

    // --- 高精度スキャンエンジン ---
    async function highPrecisionImport(input) {
        const files = Array.from(input.files);
        if (files.length === 0) return;
        document.getElementById('loading').style.display = 'flex';
        let added = 0;

        for (const file of files) {
            try {
                // 命令（プロンプト）を「ここ」のチャットと同じような深い解析を促す内容に変更
                const prompt = `あなたは非常に優秀なデータ抽出アシスタントです。提供された楽天証券のスクリーンショットから、以下のルールで全ての銘柄情報を抜き出してください。
                1. 各銘柄の「名称」と「4桁の証券コード」をペアで見つけてください。
                2. 銘柄名のすぐ下や横にある4桁の数字がコードです。
                3. 出力は必ず以下の形式のJSONにしてください。それ以外は一切書かないでください。
                {"data": [{"name": "銘柄名", "code": "4桁数字"}]}`;

                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${API_KEY}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }, { inline_data: { mime_type: file.type, data: (await toBase64(file)).split(',')[1] } }] }] })
                });
                
                const resJson = await response.json();
                const textResult = resJson.candidates[0].content.parts[0].text.replace(/```json|```/g, '').trim();
                const parsed = JSON.parse(textResult);

                parsed.data.forEach(s => {
                    if (s.code && s.code.length === 4 && !appData.stocks.some(ex => ex.code === s.code)) {
                        appData.stocks.push({ id: Date.now() + Math.random(), name: s.name, code: s.code });
                        added++;
                    }
                });
            } catch (e) { console.error("解析エラー:", e); }
        }

        save(); render();
        document.getElementById('loading').style.display = 'none';
        alert(`${added}件の銘柄を完璧に読み込みました！🚀`);
        input.value = "";
    }

    function render() {
        const container = document.getElementById('stock-list-container');
        container.innerHTML = appData.stocks.map(s => `
            <div class="stock-item">
                <div onclick="alert('${s.name}の分析は次のステップです！')">
                    <div class="stock-name">${s.name}</div>
                    <div class="stock-code">${s.code}</div>
                </div>
                <button class="action-btn" onclick="deleteStock(${s.id})">削除</button>
            </div>
        `).join('') || '<div style="padding:50px; text-align:center; color:#8b949e;">スクショを選択してください📸</div>';
    }

    const toBase64 = f => new Promise((res) => { const r = new FileReader(); r.readAsDataURL(f); r.onload = () => res(r.result); });
    function manualAdd() { const n = prompt("銘柄名"); const c = prompt("4桁コード"); if(n && c) { appData.stocks.push({id:Date.now(), name:n, code:c}); save(); render(); } }
    function clearAll() { if(confirm("消去しますか？")) { localStorage.removeItem(STORAGE_KEY); location.reload(); } }
    function deleteStock(id) { appData.stocks = appData.stocks.filter(s => s.id !== id); save(); render(); }

    render();
</script>
</body>
</html>
